	::begin::
	if (CPosToCPos_Para.OTool == CPosToCPos_Para.TTool) and (CPosToCPos_Para.OCoor == CPosToCPos_Para.TCoor) then
		equCmdCpos(CPosToCPos_Para.TP, CPosToCPos_Para.OP)

IEnter_Para={
	{_name="Secondname",_desc ="Secondname",_type="str",_init="IEnter",_comm ="<CH>中断当前解析与运动指令.</CH><EN>Start interrupt command</EN>"},
}
--指令实现
function IEnter(IEnter_Para)
	local ret = ins:PauseThread(0)
	if ret == 2 then
	  ins:setSysError(987)
	  ExecStsIsFailed(1)
	  return	
	end

	ret = ins:GetPauseThreadExecSts()
	while ret == 0 do
		ret = ins:GetPauseThreadExecSts()
		Sleep(1)
	end
	if ret == 2 or ret == 3 then  --为2表示被忽略，为3表示停止失败系统已报错
		ins:ResetPauseThreadSts()
		--ins:setRobotWarning("Interrupt happened! But IEnter execute failed!", 89999)
		ExecStsIsFailed(1)
		return
	end
	ins:UpdateInterruptDisplay()
	--置位清除本地运动缓存标志后为避免马上解析下发运动指令，而其他线程还未执行复位缓存操作而导致命令被刷掉。故需要延时20ms	
	local ret = 1
	local timeStart = ins:GetCurSysClk()
	while (ret ~= 0) do
		if  (ins:GetCurSysClk() - timeStart) >= 20 then	
			ret = 0
		else
			Sleep(1)
	    end
	end
	ins:UpdateIEnterExecEndSts()
	SetBreakFlag(1)  --设置断点标志位，影响后面逻辑等指令执行
	WaitIsParseAllowed(1,1)  -----参数1：打断方式（1=强制打断，2=可控打断）；参数2：等待到位方式（1=给定到位，2=实际到位）	
end


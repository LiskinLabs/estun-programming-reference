SetCartDyn_Para={
	{_name="Acc",       _desc ="<CH>加速度(%)</CH><EN>Acc(%)</EN>",_type="INTC",_max=200,_min=1,_init=100},
	{_name="Dec",       _desc ="<CH>减速度(%)</CH><EN>Dec(%)</EN>",_type="INTC",_max=200,_min=1,_init=100},
	{_name="Jerk",      _desc ="<CH>加加速度(%)</CH><EN>Jerk(%)</EN>",_type="INTC",_max=200,_min=1,_init=100},
    {_name="OriAcc",    _desc ="<CH>姿态加速度(%)</CH><EN>OriAcc(%)</EN>",_type="INTC",_max=200,_min=1,_init=100},
	{_name="OriDec",    _desc ="<CH>姿态减速度(%)</CH><EN>OriDec(%)</EN>",_type="INTC",_max=200,_min=1,_init=100},
	{_name="OriJerk",   _desc ="<CH>姿态加加速度(%)</CH><EN>OriJerk(%)</EN>",_type="INTC",_max=200,_min=1,_init=100},
	{_name="Torq",      _desc ="<CH>力矩(%)</CH><EN>Torq(%)</EN>",_type="INTC",_max=200,_min=1,_init=100},
    {_name="Secondname",_desc ="Secondname",_type="str",_init="SetCarD",_comm ="<CH>设置直线或圆弧运动动态参数指令.</CH><EN>Set the dynamic parameters of linear and circular motion.</EN>"},
}
--设置动态参数指令
function SetCartDyn(SetCartDyn_Para)
	local Acc
	if type(SetCartDyn_Para.Acc) == "integer" then
		Acc = SetCartDyn_Para.Acc
	elseif SetCartDyn_Para.Acc._type == "INT" then
		Acc = SetCartDyn_Para.Acc.value
	else
		ins:setSysError(978)
		ExecStsIsFailed(1)
		return
	end
	local Dec
	if type(SetCartDyn_Para.Dec) == "integer" then
		Dec = SetCartDyn_Para.Dec
	elseif SetCartDyn_Para.Dec._type == "INT" then
		Dec = SetCartDyn_Para.Dec.value
	else
		ins:setSysError(978)
		ExecStsIsFailed(1)
		return
	end
	local Jerk
	if type(SetCartDyn_Para.Jerk) == "integer" then
		Jerk = SetCartDyn_Para.Jerk
	elseif SetCartDyn_Para.Jerk._type == "INT" then
		Jerk = SetCartDyn_Para.Jerk.value
	else
		ins:setSysError(978)
		ExecStsIsFailed(1)
		return
	end
	local OriAcc
	if type(SetCartDyn_Para.OriAcc) == "integer" then
		OriAcc = SetCartDyn_Para.OriAcc
	elseif SetCartDyn_Para.OriAcc._type == "INT" then
		OriAcc = SetCartDyn_Para.OriAcc.value
	else
		ins:setSysError(978)
		ExecStsIsFailed(1)
		return
	end
	local OriDec
	if type(SetCartDyn_Para.OriDec) == "integer" then
		OriDec = SetCartDyn_Para.OriDec
	elseif SetCartDyn_Para.OriDec._type == "INT" then
		OriDec = SetCartDyn_Para.OriDec.value
	else
		ins:setSysError(978)
		ExecStsIsFailed(1)
		return
	end
	local OriJerk
	if type(SetCartDyn_Para.OriJerk) == "integer" then
		OriJerk = SetCartDyn_Para.OriJerk
	elseif SetCartDyn_Para.OriJerk._type == "INT" then
		OriJerk = SetCartDyn_Para.OriJerk.value
	else
		ins:setSysError(978)
		ExecStsIsFailed(1)
		return
	end
	local Torq
	if type(SetCartDyn_Para.Torq) == "integer" then
		Torq = SetCartDyn_Para.Torq
	elseif SetCartDyn_Para.Torq._type == "INT" then
		Torq = SetCartDyn_Para.Torq.value
	else
		ins:setSysError(978)
		ExecStsIsFailed(1)
		return
	end
	if Acc >= 1 and Acc <= 200 and
	   Dec >= 1 and Dec <= 200 and
	   Jerk >= 1 and Jerk <= 200 and
	   OriAcc >= 1 and OriAcc <= 200 and
	   OriDec >= 1 and OriDec <= 200 and
	   OriJerk >= 1 and OriJerk <= 200 and
	   Torq >= 1 and Torq <= 200 then
		mov:SetCartDyn(Acc,Dec,Jerk,OriAcc,OriDec,OriJerk,Torq)
	else
		ins:setSysError(1022)
		ExecStsIsFailed(1)
		return
	end
end


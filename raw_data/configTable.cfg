OnDistance_Para={
	{_name="Type",      _desc ="<CH>触发类型</CH><EN>Type</EN>",_type="enum",_init="FromBegin",_enum={"FromBegin", "FromEnd"}},
	{_name="dist",	    _desc ="<CH>触发距离(mm)</CH><EN>Dist</EN>",_type="REALC",_max=100000,_min=0,_init=0},
	{_name="timeMs",	_desc ="<CH>触发时间(ms)</CH><EN>timeMs</EN>",_type="INTC",_max=3000,_min=-3000,_init=0},	
	{_name="DO",        _desc ="<CH>触发操作</CH><EN>DO</EN>",_type="trigDo"},
    {_name="Secondname",_desc ="Secondname",_type="str",_init="OnDis",_comm ="<CH>距离触发指令.</CH><EN>Trigger defined by a distance to the beginning/end of a segment.</EN>"},
}
function OnDistance(OnDistance_Para)
	local checkType
	if OnDistance_Para.Type == "FromBegin" then
	  checkType = 0
	elseif OnDistance_Para.Type == "FromEnd" then
	  checkType = 1
	else
	  ins:setSysError(965)
	  ExecStsIsFailed(1)
	end

	if type(OnDistance_Para.dist) == "float" or type(OnDistance_Para.dist) == "integer" then
		distParam = OnDistance_Para.dist
	elseif OnDistance_Para.dist._type == "REAL" then
		distParam = OnDistance_Para.dist.value
	else
	    ins:setSysError(978)
	    ExecStsIsFailed(1)
		return
	end
	
	if type(OnDistance_Para.timeMs) == "integer" then
		timeParam = OnDistance_Para.timeMs
	elseif OnDistance_Para.timeMs._type == "INT" then
		timeParam = OnDistance_Para.timeMs.value
	else
	    ins:setSysError(978)
	    ExecStsIsFailed(1)
		return
	end

	local ret = mov:onDistance(checkType, distParam, timeParam, OnDistance_Para.DO)
	while ret ~= 0 do
		ret = mov:onDistance(checkType, distParam, timeParam, OnDistance_Para.DO)
		Sleep(1) --这里需要延时等待下，否则死循环出错
	end
end


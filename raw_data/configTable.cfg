function MovLSyncQuit(MovLSyncQuit_Para)
	--缺省项设定默认值
	if (MovLSyncQuit_Para.V == nil) then
		MovLSyncQuit_Para.V=t_s.V4000
	end
	if (MovLSyncQuit_Para.B == nil) then
		MovLSyncQuit_Para.B="FINE"
	end
	if (MovLSyncQuit_Para.C == nil) then
		MovLSyncQuit_Para.C = t_s.C100
	end
	if (MovLSyncQuit_Para.B == "FINE") then
		MovLSyncQuit_Para.C = t_s.C0
	end
	--缺省时设为default，轨迹将沿用当前的坐标系等参数。	
	if (MovLSyncQuit_Para.PayLoad == nil) then
		MovLSyncQuit_Para.PayLoad = "default"
	end	
	quitType = 0
	if (MovLSyncQuit_Para.QuitEnable == "ENABLE") then
		quitType = 0
	elseif (MovLSyncQuit_Para.QuitEnable == "DISENABLE") then
		quitType = 1
	end
	local ret = MoveLSyncQuit(MovLSyncQuit_Para.P,MovLSyncQuit_Para.V,MovLSyncQuit_Para.B,MovLSyncQuit_Para.C,"default",MovLSyncQuit_Para.Coord,MovLSyncQuit_Para.PayLoad,quitType,MovLSyncQuit_Para.DO)
	while ret ~= 1 do
	     ret = MoveLSyncQuit(MovLSyncQuit_Para.P,MovLSyncQuit_Para.V,MovLSyncQuit_Para.B,MovLSyncQuit_Para.C,"default",MovLSyncQuit_Para.Coord,MovLSyncQuit_Para.PayLoad,quitType,MovLSyncQuit_Para.DO)
	     Sleep(1) --这里需要延时等待下，否则死循环出错
	end
	SetBreakFlag(1)  --设置断点标志位，影响后面逻辑等指令执行
end


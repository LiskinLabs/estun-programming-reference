SetBlendParam_Para={
	{_name="B",	_desc ="<CH>过渡类型</CH><EN>BlendType</EN>",_type="enum",_init="FINE",_enum={"FINE","RELATIVE","ABSOLUTE"},_depends={"C=011"}},
	{_name="C",	_desc ="<CH>过渡值</CH><EN>BlendValue</EN>",_type="ZONE",_init="C100",_scope=0,_state="DEFAULT"},
	{_name="Secondname",_desc ="Secondname",_type="str",_init="SetBlendP",_comm ="<CH>一键过渡指令.</CH><EN>Modify default blend param.</EN>"},
}
--指令实现
function SetBlendParam(SetBlendParam_Para)
	--缺省项设定默认值
	local blendType = 0
	if SetBlendParam_Para.B == "FINE" then
		blendType = 0
	elseif SetBlendParam_Para.B == "RELATIVE" then
		blendType = 1
	elseif SetBlendParam_Para.B == "ABSOLUTE" then
		blendType = 2		
	end

	if (SetBlendParam_Para.C == nil) then
		SetBlendParam_Para.C = t_s.C100
	end
	if (SetBlendParam_Para.B == "FINE") then
		SetBlendParam_Para.C = t_s.C0
	end

	ins:SetBlendParam(blendType, SetBlendParam_Para.C)
end


-- 直线偏移移动指令实现
function MovLOffsetC(MovLOffsetC_Para)
	--缺省项设定默认值
	if (MovLOffsetC_Para.O == nil) then
		MovLOffsetC_Para.O = "GOVRON"
	elseif MovLOffsetC_Para.O == "GOVROFF" then
		if MovLOffsetC_Para.V == nil then
			ins:setSysError(974)
			ExecStsIsFailed(1)
			return
		end
	end
	if (MovLOffsetC_Para.V == nil) then
		MovLOffsetC_Para.V=t_s.V4000
	end
	if (MovLOffsetC_Para.B == nil) then
		MovLOffsetC_Para.B="FINE"
	end
	if (MovLOffsetC_Para.C == nil) then
		MovLOffsetC_Para.C=t_s.C100
	end
	if (MovLOffsetC_Para.B == "FINE") then
		MovLOffsetC_Para.C = t_s.C0
	end
	--缺省时设为default，轨迹将沿用当前Payload参数(Tool\Coord不可缺省)	
	if (MovLOffsetC_Para.PayLoad == nil) then
		MovLOffsetC_Para.PayLoad = "default"
	end
	
	local offsetPos={
	    _type="DCPOS",
		dx=MovLOffsetC_Para.TPX,
		dy=MovLOffsetC_Para.TPY,
		dz=MovLOffsetC_Para.TPZ,
		da=MovLOffsetC_Para.TPA,
		db=0.0000000,
		dc=0.0000000,
		da7=0.0000000,
		da8=0.0000000,
		da9=0.0000000,
		da10=0.0000000,
		da11=0.0000000,
		da12=0.0000000,
		da13=0.0000000,
		da14=0.0000000,
		da15=0.0000000,
		da16=0.0000000
	}
	
	--回退执行代码 add by tian 20230207	
	local obj1, obj2 = GetTargetPos()
	local MovL_Para = {}
	if (obj1) then
		if (obj2) then
			MovL_Para.P = obj2
		else
			ins:setSysError(966)   --获取不到回退点提示错误 add by tian 20230222
			ExecStsIsFailed(1)--终止指令执行add by tian 20230222
			return
		end
	end
	
	obj1, obj2 = GetTargetTool()	--获取后退执行Tool
	if (obj1) then
		if (obj2) then
			MovL_Para.Tool = obj2
		else
			ins:setSysError(995) --获取不到Tool错误提示 add by tian 20230222
			ExecStsIsFailed(1)--终止指令执行add by tian 20230222
			return
		end
	end
	
	obj1, obj2 = GetTargetCoord()	--获取后退执行Coord
	if (obj1) then
		if (obj2) then
			MovL_Para.Coord = obj2
		else
			ins:setSysError(996) --获取不到Coord错误提示 add by tian 20230222
			ExecStsIsFailed(1)--终止指令执行add by tian 20230222
			return
		end
	end
	
	if (obj1) then --表示是回退执行		
		local ret = MoveL(MovL_Para.P,MovLOffsetC_Para.V,MovLOffsetC_Para.B,MovLOffsetC_Para.C,MovL_Para.Tool,MovL_Para.Coord,MovLOffsetC_Para.PayLoad,MovLOffsetC_Para.O,MovLOffsetC_Para.DO)
		while ret ~= 1 do
			 ret = MoveL(MovL_Para.P,MovLOffsetC_Para.V,MovLOffsetC_Para.B,MovLOffsetC_Para.C,MovL_Para.Tool,MovL_Para.Coord,MovLOffsetC_Para.PayLoad,MovLOffsetC_Para.O,MovLOffsetC_Para.DO)
			 Sleep(1) --这里需要延时等待下，否则死循环出错
		end
		SetBreakFlag(1)  --设置断点标志位，影响后面逻辑等指令执行
		return
	end
	
	local ret = MoveLOffset(MovLOffsetC_Para.RP,offsetPos,MovLOffsetC_Para.T,MovLOffsetC_Para.V,MovLOffsetC_Para.B,MovLOffsetC_Para.C,MovLOffsetC_Para.Tool,MovLOffsetC_Para.Coord,MovLOffsetC_Para.PayLoad,MovLOffsetC_Para.O,MovLOffsetC_Para.DO)
	while ret ~= 1 do
	     ret = MoveLOffset(MovLOffsetC_Para.RP,offsetPos,MovLOffsetC_Para.T,MovLOffsetC_Para.V,MovLOffsetC_Para.B,MovLOffsetC_Para.C,MovLOffsetC_Para.Tool,MovLOffsetC_Para.Coord,MovLOffsetC_Para.PayLoad,MovLOffsetC_Para.O,MovLOffsetC_Para.DO)
	     Sleep(1) --这里需要延时等待下，否则死循环出错
	end
	SetBreakFlag(1)  --设置断点标志位，影响后面逻辑等指令执行
end


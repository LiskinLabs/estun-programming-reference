-- MovJSearch指令实现
function MovJSearch(MovJSearch_Para)
	--缺省项设定默认值
	if (MovJSearch_Para.V == nil) then
		MovJSearch_Para.V = t_s.V4000
	end
	if (MovJSearch_Para.B == nil) then
		MovJSearch_Para.B = "FINE"
	end
	if (MovJSearch_Para.C == nil) then
		MovJSearch_Para.C = t_s.C100
	end
	if (MovJSearch_Para.B == "FINE") then
		MovJSearch_Para.C = t_s.C0
	end
	--缺省时设为default，轨迹将沿用当前的坐标系等参数。
	if (MovJSearch_Para.Tool == nil) then
		MovJSearch_Para.Tool = "default"
	end
	if (MovJSearch_Para.Coord == nil) then
		MovJSearch_Para.Coord = "default"
	end
	if (MovJSearch_Para.PayLoad == nil) then
		MovJSearch_Para.PayLoad = "default"
	end	
	if MovJSearch_Para.Type == "DITrig" or MovJSearch_Para.Type == "SIMDITrig" then
	    if MovJSearch_Para.Value == 0 or MovJSearch_Para.Value == 1 then
		    --为正常值，不做处理
		else
	        ins:setSysError(963)
		    ExecStsIsFailed(1)
		end
	end
	local stopTy = 0
	if MovJSearch_Para.StopType == "SOFTSTOP"then  --立即停：0软停止：1
		stopTy = 1
	else
		stopTy = 0
		MovJSearch_Para.StopDecScale = 0.0
	end
	
    local ret = MoveJSearch(MovJSearch_Para.P,MovJSearch_Para.V,MovJSearch_Para.B,MovJSearch_Para.C,MovJSearch_Para.Tool,MovJSearch_Para.Coord,MovJSearch_Para.PayLoad,MovJSearch_Para.Type,MovJSearch_Para.Number,MovJSearch_Para.Value,stopTy,MovJSearch_Para.StopDecScale,MovJSearch_Para.DO)
	while ret ~= 1 do
	     ret = MoveJSearch(MovJSearch_Para.P,MovJSearch_Para.V,MovJSearch_Para.B,MovJSearch_Para.C,MovJSearch_Para.Tool,MovJSearch_Para.Coord,MovJSearch_Para.PayLoad,MovJSearch_Para.Type,MovJSearch_Para.Number,MovJSearch_Para.Value,stopTy,MovJSearch_Para.StopDecScale,MovJSearch_Para.DO)
		 Sleep(1) --这里需要延时等待下，否则死循环出错
	end
	SetBreakFlag(1)  --设置断点标志位，影响后面逻辑等指令执行
	--强制打断和后面的过渡
	WaitIsParseAllowed(1,1)  -----参数1：打断方式（1=强制打断，2=可控打断）；参数2：等待到位方式（1=给定到位，2=实际到位）
	MovJSearch_Para.R.value = mov:GetSearchExecSts()
	if MovJSearch_Para.R.value >= 1 then
		if MovJSearch_Para.SearchP ~= nil then
			mov:SetMSearchPosType(0)
			UpdataAPOS(MovJSearch_Para.SearchP)
		end
	end
	if MovJSearch_Para.R.value ~= 1 then
		if MovJSearch_Para.Goto ~= nil then --超时退出则goto到指定label
			WaitGotoLabel(MovJSearch_Para.Goto)--回调跳转函数
		end
	end
end


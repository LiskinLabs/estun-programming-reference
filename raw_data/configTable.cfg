-- MovLSearch指令实现
function MovLSearch(MovLSearch_Para)
	--缺省项设定默认值
	if (MovLSearch_Para.V == nil) then
		MovLSearch_Para.V = t_s.V4000
	end
	if (MovLSearch_Para.B == nil) then
		MovLSearch_Para.B = "FINE"
	end
	if (MovLSearch_Para.C == nil) then
		MovLSearch_Para.C = t_s.C100
	end
	if (MovLSearch_Para.B == "FINE") then
		MovLSearch_Para.C = t_s.C0
	end
	--缺省时设为default，轨迹将沿用当前的坐标系等参数。
	if (MovLSearch_Para.Tool == nil) then
		MovLSearch_Para.Tool = "default"
	end
	if (MovLSearch_Para.Coord == nil) then
		MovLSearch_Para.Coord = "default"
	end
	if (MovLSearch_Para.PayLoad == nil) then
		MovLSearch_Para.PayLoad = "default"
	end
	if MovLSearch_Para.Type == "DITrig" or MovLSearch_Para.Type == "SIMDITrig" then
	    if MovLSearch_Para.Value == 0 or MovLSearch_Para.Value == 1 then
		    --为正常值，不做处理
		else
	        ins:setSysError(963)
		    ExecStsIsFailed(1)
		end
	end	
	local stopTy = 0
	if MovLSearch_Para.StopType == "SOFTSTOP"then
		stopTy = 1
	else
		stopTy = 0
		MovLSearch_Para.StopDecScale = 0.0
	end
	
    local ret = MoveLSearch(MovLSearch_Para.P,MovLSearch_Para.V,MovLSearch_Para.B,MovLSearch_Para.C,MovLSearch_Para.Tool,MovLSearch_Para.Coord,MovLSearch_Para.PayLoad,"GOVRON",MovLSearch_Para.Type,MovLSearch_Para.Number,MovLSearch_Para.Value,stopTy,MovLSearch_Para.StopDecScale,MovLSearch_Para.DO)
	while ret ~= 1 do
	     ret = MoveLSearch(MovLSearch_Para.P,MovLSearch_Para.V,MovLSearch_Para.B,MovLSearch_Para.C,MovLSearch_Para.Tool,MovLSearch_Para.Coord,MovLSearch_Para.PayLoad,"GOVRON",MovLSearch_Para.Type,MovLSearch_Para.Number,MovLSearch_Para.Value,stopTy,MovLSearch_Para.StopDecScale,MovLSearch_Para.DO)
	     Sleep(1) --这里需要延时等待下，否则死循环出错
	end
	SetBreakFlag(1)   --设置断点标志位，影响后面逻辑等指令执行
	--强制打断和后面的过渡
	WaitIsParseAllowed(1,1)  -----参数1：打断方式（1=强制打断，2=可控打断）；参数2：等待到位方式（1=给定到位，2=实际到位）
	MovLSearch_Para.R.value = mov:GetSearchExecSts()
	if MovLSearch_Para.R.value >= 1 then
		if MovLSearch_Para.SearchP ~= nil then
			mov:SetMSearchPosType(1)
			UpdataCPOS(MovLSearch_Para.SearchP)
		end
	end
	if MovLSearch_Para.R.value ~= 1 then
		if MovLSearch_Para.Goto ~= nil then --超时退出则goto到指定label
			WaitGotoLabel(MovLSearch_Para.Goto)--回调跳转函数
		end
	end
end


	{_name="Coord",_desc ="<CH>坐标系参数</CH><EN>Coord</EN>",_type="USERCOOR",_comm ="<CH></CH>"},
	{_name="TP",_desc ="<CH>目标位置</CH><EN>TargetPos</EN>",_type="CPOS",_comm ="<CH></CH>"},
    {_name="Secondname",_desc ="Secondname",_type="str",_init="CalPosOffset",_comm ="<CH>计算位置点偏移结果指令.</CH><EN>Calculate the offset result of POS command.</EN>"},
}

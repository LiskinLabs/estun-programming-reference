	{_name="DO", _desc ="AddDo",_type="func"},
	{_name="Secondname",_desc ="Secondname",_type="str",_init="MovLSyncQuit",_comm ="<CH>退出传送带同步的直线运动指令.</CH><EN>Linear motion command with quit conveyot belt synchronization.</EN>"},

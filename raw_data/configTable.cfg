PosOffset_Para={
	{_name="Mode",  _desc ="<CH>操作模式</CH><EN>Operate Mode</EN>",_type="enum",_init="UpdateSingleAxisPos",_enum={"UpdateSingleAxisPos","ExchangeAxisPos"},_depends={"DestAxis=11","Pos=10","SrcAxis=01"}},
	{_name="DestAxis",  _desc ="<CH>目标轴号</CH><EN>Target Axis number</EN>",_type="int",_max=32,_min=1,_init=1},
	{_name="Pos",  _desc ="<CH>目标坐标值</CH><EN>Target position</EN>",_type="real",_max=100000,_min=-100000,_init=0},
	{_name="SrcAxis",  _desc ="<CH>基准轴号</CH><EN>Src Axis number</EN>",_type="int",_max=32,_min=1,_init=1},
    {_name="Secondname",_desc ="Secondname",_type="str",_init="PosOffset",_comm ="<CH>轴坐标偏移指令.</CH><EN>Set the position offset of axis command.</EN>"},	
}

function PosOffset(PosOffset_Para)
	WaitIsParseAllowed(1,1) -----参数1：打断方式（1=强制打断，2=可控打断）；参数2：等待到位方式（1=给定到位，2=实际到位）
	if mov:CheckAuxAxisIdIsValid(PosOffset_Para.DestAxis) ~= true then
		ins:setSysError(1014)
		ExecStsIsFailed(1)
		return
	end
	local tempData, tempMode
	if PosOffset_Para.Mode == "UpdateSingleAxisPos" then
		tempMode = 1
		tempData = PosOffset_Para.Pos
	elseif PosOffset_Para.Mode == "ExchangeAxisPos" then
		tempMode = 2	
		tempData = PosOffset_Para.SrcAxis
		if mov:CheckAuxAxisIdIsValid(PosOffset_Para.SrcAxis) ~= true then
			ins:setSysError(1014)
			ExecStsIsFailed(1)
			return
		end
	end
	ins:SetAxisPosOperatCmd(tempMode, PosOffset_Para.DestAxis, tempData)
	ret = ins:GetAxisPosExecSts()
	while ret ~= 0 do
		if ret == 3 then
			ins:setSysError(1016)
			ExecStsIsFailed(1)
			return
		end
		Sleep(1)
		ret = ins:GetAxisPosExecSts()
	end
end

AxisLock_Para={
	{_name="DestAxis",  _desc ="<CH>目标轴号</CH><EN>Target Axis number</EN>",_type="int",_max=32,_min=1,_init=1},
	{_name="EnableSts",  _desc ="<CH>使能状态</CH><EN>Enable Status</EN>",_type="enum",_init="ON",_enum={"ON","OFF"}},
    {_name="Secondname",_desc ="Secondname",_type="str",_init="AxisLock",_comm ="<CH>轴锁定指令.</CH><EN>Axis lock command.</EN>"},
}
function AxisLock(AxisLock_Para)
	WaitIsParseAllowed(1,1) -----参数1：打断方式（1=强制打断，2=可控打断）；参数2：等待到位方式（1=给定到位，2=实际到位）
	local bRet = mov:GetRobotIsMoving()
	while bRet == true do
		Sleep(1)
		bRet = mov:GetRobotIsMoving()
	end
	if mov:CheckAuxAxisIdIsValid(AxisLock_Para.DestAxis) ~= true then
		ins:setSysError(1014)
		ExecStsIsFailed(1)
		return
	end
	local lockSts = 0
	if AxisLock_Para.EnableSts == "ON" then
		lockSts = 1
	elseif AxisLock_Para.EnableSts == "OFF" then
		lockSts = 0	
	end	
	::begin::
	local ret = mov:SetAxisLockCmd(lockSts, AxisLock_Para.DestAxis)
	if ret ~= true then
		ins:setSysError(1014)
	else
		ret = mov:GetAxisLockCmdRes()
		while ret == -1 do
			ret = mov:GetAxisLockCmdRes()
			Sleep(1)
		end
		if ret ~= 0 then
			Sleep(100)
			goto begin
		end
	end
end


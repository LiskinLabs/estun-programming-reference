end

MovToIPos_Para={
	{_name="Mode",	_desc ="<CH>运动方式</CH><EN>Mode</EN>",_type="enum",_init="MOVJ",_enum={"MOVJ","MOVL"}},
	{_name="V",	_desc ="<CH>目标速度</CH><EN>Velo</EN>",_type="SPEED",_init="V4000",_scope=0,_state="DEFAULT"},
	{_name="Secondname",_desc ="Secondname",_type="str",_init="MovToIPos",_comm ="<CH>返回中断点指令.</CH><EN>Return snap pos which interrupt happened.</EN>"},
}

function MovToIPos(MovToIPos_Para)
	--缺省项设定默认值
	if (MovToIPos_Para.V == nil) then
		MovToIPos_Para.V = t_s.V1000
	end

	local ret = ins:SetCurInrqPosMotMode(1)
	if ret ~= 0 then
	  ins:setSysError(986)
	  ExecStsIsFailed(1)
	end

	ret = MovResume(MovToIPos_Para.Mode,MovToIPos_Para.V)
	while ret ~= 1 do
	     ret = MovResume(MovToIPos_Para.Mode,MovToIPos_Para.V)
	     Sleep(1) --这里需要延时等待下，否则死循环出错
	end
	SetBreakFlag(1)  --设置断点标志位，影响后面逻辑等指令执行
	WaitIsParseAllowed(1,1)  -----参数1：打断方式（1=强制打断，2=可控打断）；参数2：等待到位方式（1=给定到位，2=实际到位）
	ins:SetCurInrqPosMotMode(0)
end


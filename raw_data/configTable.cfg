--TOOL偏移计算指令
ToolOffset_Para={
	{_name="F1",      _desc ="<CH>基准工具参数</CH><EN>Tool1</EN>",_type="TOOL"},
	{_name="P",			_desc ="<CH>偏移量</CH><EN>Offset</EN>",_type="DCPOS",_comm ="<CH>偏移量</CH><EN>Offset</EN>"},
	{_name="F2", 	_desc ="<CH>目标工具参数</CH><EN>Tool2</EN>",_type="TOOL"},
    {_name="Secondname",_desc ="Secondname",_type="str",_init="ToolOffset",_comm ="<CH>TOOL计算指令.</CH><EN>Convert tool1 to tool2 command.</EN>"},
}
function ToolOffset(ToolOffset_Para)
	WaitIsParseAllowed(2,1)  -----参数1：打断方式（1=强制打断，2=可控打断）；参数2：等待到位方式（1=给定到位，2=实际到位）

	::begin::
	local ret = mov:CalcFrameToFrame(ToolOffset_Para)
	if ret ~= true then
	    ins:setSysError(969)
	    ExecStsIsFailed(1)
	else
		ret = mov:GetCalcFrameToFrameCmdRes()
		while ret == -1 do
			ret = mov:GetCalcFrameToFrameCmdRes()
			Sleep(1)
		end
		if ret ~= 0 then
			Sleep(100)
			goto begin
		elseif ret == 0 then
			ToolOffset_Para.F2.x = mov:GetCoordParam(1)
			ToolOffset_Para.F2.y = mov:GetCoordParam(2)
			ToolOffset_Para.F2.z = mov:GetCoordParam(3)
			ToolOffset_Para.F2.a = mov:GetCoordParam(4)
			ToolOffset_Para.F2.b = mov:GetCoordParam(5)
			ToolOffset_Para.F2.c = mov:GetCoordParam(6)
			
			ToolOffset_Para.F2.dyn.M = ToolOffset_Para.F1.dyn.M
			
			ToolOffset_Para.F2.dyn.pos.Mx = ToolOffset_Para.F1.dyn.pos.Mx
			ToolOffset_Para.F2.dyn.pos.My = ToolOffset_Para.F1.dyn.pos.My
			ToolOffset_Para.F2.dyn.pos.Mz = ToolOffset_Para.F1.dyn.pos.Mz
			
			ToolOffset_Para.F2.dyn.tensor.Ixx = ToolOffset_Para.F1.dyn.tensor.Ixx
			ToolOffset_Para.F2.dyn.tensor.Iyy = ToolOffset_Para.F1.dyn.tensor.Iyy
			ToolOffset_Para.F2.dyn.tensor.Izz = ToolOffset_Para.F1.dyn.tensor.Izz
			ToolOffset_Para.F2.dyn.tensor.Ixy = ToolOffset_Para.F1.dyn.tensor.Ixy
			ToolOffset_Para.F2.dyn.tensor.Iyz = ToolOffset_Para.F1.dyn.tensor.Iyz
			ToolOffset_Para.F2.dyn.tensor.Ixz = ToolOffset_Para.F1.dyn.tensor.Ixz
		end
	end
end


---------------------------- 指令定义 ----------------------------
-- 注意：指令参数名为指令实现名+'_Para'，如'MovJ'的参数为'MovJ_Para'
-- 注意：指令脚本中如果写死循环一定要添加Sleep()，否则程序出错！

-- 指令封装
-- 将运动指令段填写到处理缓存，缓存满会一直等待填写
function pushMovInst(inst)
	local ret = mov:PushInst(inst)
	while ret ~= true do
		ret = mov:PushInst(inst)
		Sleep(1) --这里需要延时等待下，否则死循环出错
	end
end

--获取回退执行的目标点
function GetTargetPos()
	local bIsBack = ins:IsRunBack()	--是否后退执行
	if (bIsBack == true) then
		local strPosName = ins:GetBackPosName()	--获取后退执行目标点名称
		if (strPosName == "false") then
			ins:setSysError(966)
			ExecStsIsFailed(1) --终止指令执行add by tian 20230222
			return true
		end
		
		--处理MovLOffset指令作为目标点 add by tian 20230203
		if (string.match(strPosName,"*#RP") == "*#RP") then --表示获取的是参考位置点需要计算最终需要的位置点 add by tian 20230203
			strPosName = string.gsub(strPosName,"*#RP","")
			local posRP
			local iScope = ins:GetBackPosScope()		--获取后退执行目标点域
			if (iScope == 1) then
				posRP = t_g[strPosName]		
			elseif (iScope == 2) then
				posRP = t_p[strPosName]
			elseif (iScope == 3) then
				posRP = t_l[strPosName]
			else
				ins:setSysError(966)
				ExecStsIsFailed(1)--终止指令执行add by tian 20230222
				return true
			end			
			local CalPosOffset_Para = {}
			CalPosOffset_Para.OP = posRP;
			local obj1, obj2	= GetTargetTPPos()	--获取偏移量
			if (obj1) then
				if (obj2) then
					CalPosOffset_Para.RP = obj2
				else
					ins:setSysError(993)
					ExecStsIsFailed(1)--终止指令执行add by tian 20230222
					return
				end
			end
						
			obj1, obj2 = GetTargetTName()	      --获取后退执行T(参考坐标系)
			if (obj1) then
				if (obj2) then
					CalPosOffset_Para.T = obj2
				else
					ins:setSysError(994)
					ExecStsIsFailed(1)--终止指令执行add by tian 20230222
					return
				end
			end
			
			obj1, obj2 = GetTargetTool()	     --获取后退执行Tool
			if (obj1) then
				if (obj2) then
					CalPosOffset_Para.Tool = obj2
				else
					ins:setSysError(995)
					ExecStsIsFailed(1)--终止指令执行add by tian 20230222
					return
				end
			end
	
			obj1, obj2 = GetTargetCoord()	--获取后退执行Coord
			if (obj1) then
				if (obj2) then
					CalPosOffset_Para.Coord = obj2
				else
					ins:setSysError(996)
					ExecStsIsFailed(1)--终止指令执行add by tian 20230222
					return
				end
			end
			--计算最终位置点
			CalPosOffset_Para.TP={_type="CPOS",confdata={_type="POSCFG",mode=0}}
			CalPosOffset(CalPosOffset_Para)
			if(CalPosOffset_Para.TP.x) then
			  return true,CalPosOffset_Para.TP
			else
			  ins:setSysError(984)--计算位置点偏移结果失败
			  ExecStsIsFailed(1)--终止指令执行add by tian 20230222
			  return false
			end
		end
		
		local iScope = ins:GetBackPosScope()		--获取后退执行目标点域
		if (iScope == 1) then
			return true, t_g[strPosName]		--修改运动目标点t_g[strPosName]
		elseif (iScope == 2) then
			return true, t_p[strPosName]
		elseif (iScope == 3) then
			return true, t_l[strPosName]
		else
			ins:setSysError(966)
			ExecStsIsFailed(1)--终止指令执行add by tian 20230222
			return true
		end
	end
	return false
end

--获取回退执行的Tool
function GetTargetTool()
	local bIsBack = ins:IsRunBack()	--是否后退执行
	if (bIsBack == true) then
		local strToolName = ins:GetBackToolName()	--获取后退执行Tool名称
		if (strToolName == "false") then
			ins:setSysError(966)
			ExecStsIsFailed(1)--终止指令执行add by tian 20230222
			return true
		elseif (strToolName == "default") then			--未获取到则使用默认值
			return true, "default"
		end
		local iScope = ins:GetBackToolScope()		--获取后退执行Tool域
		if (iScope == 1) then
			return true, t_g[strToolName]
		elseif (iScope == 0) then
			return true, t_s[strToolName]
		else
			ins:setSysError(966)
			ExecStsIsFailed(1)--终止指令执行add by tian 20230222
			return true
		end
	end
	return false
end


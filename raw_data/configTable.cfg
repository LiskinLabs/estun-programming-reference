APosToCPos_Para={
	{_name="OP",	_desc ="<CH>原位置</CH><EN>OritionPos</EN>",_type="APOS",_comm ="<CH></CH>"},
	{_name="TP",	_desc ="<CH>目标位置</CH><EN>TargetPos</EN>",_type="CPOS",_comm ="<CH></CH>"},
	{_name="Tool",	_desc ="<CH>目标工具参数</CH><EN>TargetTool</EN>",_type="TOOL",_comm ="<CH></CH>"},
	{_name="Coor",	_desc ="<CH>目标坐标系</CH><EN>TargetCoord</EN>",_type="COORD",_comm ="<CH></CH>"},
	{_name="R",     _desc ="<CH>返回值</CH><EN>ResultV</EN>",_type="INT",_state="DEFAULT"},
    {_name="Secondname",_desc ="Secondname",_type="str",_init="AToC",_comm ="<CH>位置点APOS转CPOS指令.</CH><EN>Switch the axis position to coordinate position.</EN>"},
}
-- 指令实现
function APosToCPos(APosToCPos_Para)
    WaitIsParseAllowed(2,1)  -----参数1：打断方式（1=强制打断，2=可控打断）；参数2：等待到位方式（1=给定到位，2=实际到位）
	::begin::
	local ret = mov:TransPosNoCheak("ATC",APosToCPos_Para.OP,APosToCPos_Para.Coor,APosToCPos_Para.Tool)
	if ret ~= true then
		ins:setSysError(951)
		ExecStsIsFailed(1)
	else
		local retG = mov:GetPosTransCmdRes()
		while retG == -1 do
			retG = mov:GetPosTransCmdRes()
			Sleep(1)
		end
		if retG ~= 0 then
			if  APosToCPos_Para.R ~= nil then
				APosToCPos_Para.R.value = retG
			end
		else
			UpdataCPOS(APosToCPos_Para.TP)
		end
	end
end


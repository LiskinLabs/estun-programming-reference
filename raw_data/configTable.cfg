--获取回退执行的TP add by tian 20230129
function GetTargetTPPos()
	local bIsBack = ins:IsRunBack()	--是否后退执行
	if (bIsBack == true) then
		local strPosName = ins:GetBackTPPosName()	--获取后退执行相对位置点名称
		if (strPosName == "false") then
			local vec = ins:GetBackTPPosParam()
			if vec == 1 then
			ins:setSysError(966)
			ExecStsIsFailed(1)--终止指令执行add by tian 20230222
			return true
		end
			local offsetPos={
				_type="DCPOS",
				dx=ins:GetSelectAxisBackTPPosParam(0),
				dy=ins:GetSelectAxisBackTPPosParam(1),
				dz=ins:GetSelectAxisBackTPPosParam(2),
				da=ins:GetSelectAxisBackTPPosParam(3),
				db=ins:GetSelectAxisBackTPPosParam(4),
				dc=ins:GetSelectAxisBackTPPosParam(5),
				da7=0.0000000,
				da8=0.0000000,
				da9=0.0000000,
				da10=0.0000000,
				da11=0.0000000,
				da12=0.0000000,
				da13=0.0000000,
				da14=0.0000000,
				da15=0.0000000,
				da16=0.0000000
			}
			return true, offsetPos
		else
		local iScope = ins:GetBackTPPosScope()		--获取后退执行相对位置点域
		if (iScope == 1) then
			return true, t_g[strPosName]		    
		elseif (iScope == 2) then
			return true, t_p[strPosName]
		elseif (iScope == 3) then
			return true, t_l[strPosName]
		else
			ins:setSysError(966)
			ExecStsIsFailed(1)--终止指令执行add by tian 20230222
			return true
		end
	end
	end
	return false
end
--获取后退执行的参考坐标系(T) add by tian 20230201
function GetTargetTName()
	local bIsBack = ins:IsRunBack()	--是否后退执行
	if (bIsBack == true) then
		local strTName = ins:GetBackTName()	--获取后退执行相对位置点名称
		if (strPosName == "false") then
			ins:setSysError(966)
			ExecStsIsFailed(1)--终止指令执行add by tian 20230222
			return false
		else 
			return true,strTName
		end
	end
	return false
end



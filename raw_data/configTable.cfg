SetDO_Para={
	{_name="IO",        _desc ="<CH>端口变量</CH><EN>IO</EN>",_type="DO"},
	{_name="Val",       _desc ="<CH>端口值</CH><EN>Value</EN>",_type="INTC",_max=1,_min=0,_init=0},
    {_name="Secondname",_desc ="Secondname",_type="str",_init="SetDO",_comm ="<CH>设置数字量输出指令.</CH><EN>Set DOut value command.</EN>"},
}

function SetDO(SetDO_Para)
	WaitIsParseAllowed(2,2)  -----参数1：打断方式（1=强制打断，2=可控打断）；参数2：等待到位方式（1=给定到位，2=实际到位）
	if SetDO_Para.IO.port == 0 then
		return
	end
	local DOVal
	if type(SetDO_Para.Val) == "integer" then
		DOVal = SetDO_Para.Val
	elseif SetDO_Para.Val._type == "INT" then
		DOVal = SetDO_Para.Val.value
	else
		ins:setSysError(978)
		ExecStsIsFailed(1)
		return
	end
	if DOVal ~= 0 and DOVal ~= 1 then
		ins:setSysError(1021)
		ExecStsIsFailed(1)
		return
	end
	if SetDO_Para.IO.port < 9 and SetDO_Para.IO.port > 0 then
	    ins:setSysError(961)
		ExecStsIsFailed(1)
	end
	mov:SetDO(SetDO_Para.IO.port, DOVal)
	local doValue = mov:GetDO(SetDO_Para.IO.port) --对设置成功与否进行等待，避免后续判断出错。(add by lww)
	while doValue ~= DOVal do
		doValue = mov:GetDO(SetDO_Para.IO.port)
		Sleep(1) --这里需要延时等待下，否则死循环出错
	end

end

--DI等待
WaitDI_Para={
	{_name="IO",        _desc ="<CH>端口变量</CH><EN>IO</EN>",_type="DI"},
	{_name="Val",       _desc ="<CH>端口值</CH><EN>Value</EN>",_type="INTC",_max=1,_min=0,_init=0},
	{_name="T",           _desc ="<CH>时长(ms)</CH><EN>Time(ms)</EN>",_type="INTC",_max=1000000,_min=0,_init=0,_comm ="<CH>0表示无限等待，非0值为正常等待时间</CH><EN>0: infinite wait;  Non-zero: normal wait time</EN>"},
	{_name="InterEnable", _desc ="<CH>中断使能</CH><EN>IsInterrupt</EN>",_type="int",_max=1,_min=0,_init=0,_comm ="<CH>该参数在本版本无意义</CH><EN>Unusual parameter</EN>"},	
	{_name="Ret",         _desc ="<CH>超时判断值</CH><EN>IsOvertime</EN>",_type="INT"},	
	{_name="Goto",       _desc ="<CH>超时跳转的标签名</CH><EN>LabelName</EN>",_type="label"},
    {_name="Secondname",_desc ="Secondname",_type="str",_init="WaitDI",_comm ="<CH>等待数字量输入指令.</CH><EN>Wait DIn signal command.</EN>"},
}

function WaitDI(WaitDI_Para)
	WaitIsParseAllowed(2,2)  -----参数1：打断方式（1=强制打断，2=可控打断）；参数2：等待到位方式（1=给定到位，2=实际到位）
	local timeParam
	if type(WaitDI_Para.T) == "integer" then
		timeParam = WaitDI_Para.T
	elseif WaitDI_Para.T._type == "INT" then
		timeParam = WaitDI_Para.T.value
	else
	    ins:setSysError(978)
	    ExecStsIsFailed(1)
		return
	end
	local DIVal
	if type(WaitDI_Para.Val) == "integer" then
		DIVal = WaitDI_Para.Val
	elseif WaitDI_Para.Val._type == "INT" then
		DIVal = WaitDI_Para.Val.value
	else
	    ins:setSysError(978)
	    ExecStsIsFailed(1)
		return
	end
	if DIVal ~=0 and DIVal ~= 1 then
		ins:setSysError(1021)
	    ExecStsIsFailed(1)
		return
	end
	local ret = 1
	local timeCount = ins:GetCurSysClk()
	while (ret ~= 0) do
	  local portValue = mov:GetDI(WaitDI_Para.IO.port)
	  if portValue == DIVal then -----已满足判断条件
	    WaitDI_Para.Ret.value = 0
		ret = 0
	
		return
	  else
	    if timeParam ~= 0 then
	       if  (ins:GetCurSysClk() - timeCount) >= timeParam then  -----判断条件为超时退出
		      WaitDI_Para.Ret.value = 1
			  ret = 0
	       end
	    end
	  end
	  Sleep(1) 
	end
	if WaitDI_Para.Ret.value == 1 and WaitDI_Para.Goto ~= nil then --超时退出则goto到指定label
		WaitGotoLabel(WaitDI_Para.Goto)--回调跳转函数
	end	
end


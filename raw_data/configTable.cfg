function SetTorqueLimit(SetTorqueLimit_Para)
	WaitIsParseAllowed(1,1)
	::begin::
	local ret = mov:SdoWriteCmdInst("Pn401", SetTorqueLimit_Para.Axis, SetTorqueLimit_Para.Val)
	if ret ~= true then
		ins:setSysError(990)
		Sleep(100)		-- 等待错误被处理
		goto begin
	else
		ret = mov:GetSdoWriteCmdInstRes()
		while ret == -1 do
			Sleep(1)
			ret = mov:GetSdoWriteCmdInstRes()
		end
		if ret ~= 0 then
			ins:setSysError(990)
			Sleep(100)
			goto begin
		end
	end
	
	ret = mov:SdoWriteCmdInst("Pn402", SetTorqueLimit_Para.Axis, SetTorqueLimit_Para.Val)
	if ret ~= true then
		ins:setSysError(990)
		Sleep(100)
		goto begin
	else
		ret = mov:GetSdoWriteCmdInstRes()
		while ret == -1 do
			ret = mov:GetSdoWriteCmdInstRes()
			Sleep(1)
		end
		if ret ~= 0 then
			ins:setSysError(990)
			Sleep(100)
			goto begin
		end
	end
end


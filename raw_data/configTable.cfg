function CalPosOffset(CalPosOffset_Para)
	WaitIsParseAllowed(2,1)  -----参数1：打断方式（1=强制打断，2=可控打断）；参数2：等待到位方式（1=给定到位，2=实际到位）
	::begin::
	local ret = mov:TransPosOffset(CalPosOffset_Para.OP,CalPosOffset_Para.RP,CalPosOffset_Para.T,CalPosOffset_Para.Tool,CalPosOffset_Para.Coord)
	if ret ~= true then
		ins:setSysError(992)
		ExecStsIsFailed(1)
	else
		local retG = mov:GetPosOffsetCmdRes()
		while retG == -1 do
			retG = mov:GetPosOffsetCmdRes()
			Sleep(1)
		end
		if retG ~= 0 then
			Sleep(100)
			goto begin
		end
		UpdataCPOSNoCal(CalPosOffset_Para.TP)
	end
end

-- 左右手指令
Hand_Para={
	{_name="Scope",	_desc ="<CH>左右手设置</CH><EN>Scope</EN>",_type="enum",_init="Lefty",_enum={"Lefty","Righty","Default"}},
    {_name="Secondname",_desc ="Secondname",_type="str",_init="Hand",_comm ="<CH>左右手切换指令.</CH><EN>Righty/Lefty hand command</EN>"},
}
-- 指令实现
function Hand(Hand_Para)
	WaitIsParseAllowed(1,1)  -----参数1：打断方式（1=强制打断，2=可控打断）；参数2：等待到位方式（1=给定到位，2=实际到位）
	local HandScope = 0
	if Hand_Para.Scope == "Lefty" then 
		HandScope = 1
	elseif Hand_Para.Scope == "Righty" then 
		HandScope = 2
	elseif Hand_Para.Scope == "Default" then 
		HandScope = 0
	else
	  ins:setSysError(965)
	  ExecStsIsFailed(1)
	end	
	::begin::
	local ret = mov:Hand(HandScope)
	if ret ~= true then
		ins:setSysError(960)
	    ExecStsIsFailed(1)
	else
		ret = mov:GetHandCmdRes()
		while ret == -1 do
			ret = mov:GetHandCmdRes()
			Sleep(1)
		end
		if ret ~= 0 then
			Sleep(100)
			goto begin
		end
	end	
end


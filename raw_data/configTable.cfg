	{_name="Goto",       _desc ="<CH>超时跳转的标签名</CH><EN>LabelName</EN>",_type="label"},	
    {_name="Secondname",      _desc ="Secondname",_type="str",_init="WaitC",_comm ="<CH>等待指定判断条件指令</CH><EN>Wait until the condition is true or timer timeout, and run next command.</EN>"},
}

function WaitCondition(WaitCondition_Para)	
	if ins:GetCurParseBreakLevel() == 0 then
		WaitIsParseAllowed(2,1)  -----参数1：打断方式（1=强制打断，2=可控打断）；参数2：等待到位方式（1=给定到位，2=实际到位）
	end
	local timeParam
	if type(WaitCondition_Para.T) == "integer" then
		timeParam = WaitCondition_Para.T
	elseif WaitCondition_Para.T._type == "INT" then
		timeParam = WaitCondition_Para.T.value
	else
	    ins:setSysError(978)
	    ExecStsIsFailed(1)
		return
	end	
	local ret = 1
	local timeCount = ins:GetCurSysClk()
	while (ret ~= 0) do
	  ret = ins:GetStrConditionResult(WaitCondition_Para.JudgeCondi)
	  if ret == 1 then -----已满足判断条件
	    WaitCondition_Para.Ret.value = 0
		ret = 0
		return
	  else
	    ret = 2
	    if timeParam ~= 0 then
		  if  (ins:GetCurSysClk() - timeCount) >= timeParam then  -----判断条件为超时退出
		      WaitCondition_Para.Ret.value = 1
			  ret = 0
	       end
		end
	  end
	  Sleep(1) 
	end
	if WaitCondition_Para.Ret.value == 1 and WaitCondition_Para.Goto ~= nil then --超时退出则goto到指定label
		WaitGotoLabel(WaitCondition_Para.Goto)--回调跳转函数
	end
end


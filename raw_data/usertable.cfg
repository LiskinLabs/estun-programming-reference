--在线辨识指令
CalcDynMdl_Para={
	{_name="mdlType",  _desc ="<CH>辨识的模型类型</CH><EN>Identified model type</EN>",_type="enum",_init="TypeTool",_enum={"TypeTool","TypePayload"},_depends={"Tool=10","PayLoad=01"}},
	{_name="Tool", _desc ="<CH>工具变量</CH><EN>Tool</EN>",_type="TOOL"},
	{_name="PayLoad",_desc ="<CH>工件负载变量</CH><EN>PayLoad</EN>",_type="PAYLOAD"},
	{_name="dataStepPer",  _desc ="<CH>数据间隔长度</CH><EN>Identify the percentage of data extraction length</EN>",_type="int",_max=100,_min=0,_init=0},
	{_name="validEnable",  _desc ="<CH>是否模型验证</CH><EN>Model validation</EN>",_type="enum",_init="Disable",_enum={"Enable","Disable"}},
    {_name="Secondname", _desc ="Secondname",_type="str",_init="CalcDynMdl",_comm ="<CH>设置模型参数辨识指令.</CH><EN>Set model identication parameters.</EN>"},
}
function CalcDynMdl(CalcDynMdl_Para)
	WaitIsParseAllowed(1,1)  -----参数1：打断方式（1=强制打断，2=可控打断）；参数2：等待到位方式（1=给定到位，2=实际到位）
	local mType = 0
	if CalcDynMdl_Para.mdlType == "TypeRobot" then
		mType = 1
	elseif CalcDynMdl_Para.mdlType == "TypeTool" then
		mType = 2
	elseif CalcDynMdl_Para.mdlType == "TypePayload" then
		mType = 3
	end

	local vEnable = 0
	if CalcDynMdl_Para.validEnable == "Enable" then
		vEnable = 1
	elseif CalcDynMdl_Para.validEnable == "Disable" then
		vEnable = 2
	end
	
	if ins:CheckParamIsTruely() ~= 0 then
		ins:setSysError(984)
		ExecStsIsFailed(1)
		return	
	end

	if erbd:getErbdUsedSts() ~= true then	--检测当前机型能否使用ERBD功能
		ExecStsIsFailed(1)
		return
	end

	erbd:startErbdCalcMdl(1, mType, CalcDynMdl_Para.dataStepPer, vEnable)                 --ER_ERBD内部函数
	local ret = erbd:getErbdCalcMdlState() --0空闲;1模型辨识中;2模型辨识完成;3操作失败;4写文件，  --ER_ERBD内部函数
	while ret ~= 4 do
		Sleep(2)
		ret = erbd:getErbdCalcMdlState()
		if ret == 2 then
			Sleep(4)
		elseif ret == 3 then                 --失败则报错
		  --ins:setSysError(979)
		  ExecStsIsFailed(1)
		  return
		end
	end

	vec = getMassAttribute()
	if mType == 2 then
		UpdateVecsToTool(vec, CalcDynMdl_Para.Tool)
		ins:UpdateParamToFile() --更新模型参数文件
	elseif mType == 3 then
		UpdateVecsToPayload(vec, CalcDynMdl_Para.PayLoad)
		ins:UpdateParamToFile() --更新模型参数文件
	end
end

function UpdateVecsToTool(vecs, toolP)
	toolP.dyn.M = vecs[1]
	toolP.dyn.pos.Mx = vecs[2]
	toolP.dyn.pos.My = vecs[3]
	toolP.dyn.pos.Mz = vecs[4]
	toolP.dyn.tensor.Ixx = vecs[5]
	toolP.dyn.tensor.Iyy = vecs[6]
	toolP.dyn.tensor.Izz = vecs[7]
	toolP.dyn.tensor.Ixy = vecs[8]
	toolP.dyn.tensor.Iyz = vecs[9]
	toolP.dyn.tensor.Ixz = vecs[10]	
end

function UpdateVecsToPayload(vecs, payloadP)
	payloadP.dyn.M = vecs[1]
	payloadP.dyn.pos.Mx = vecs[2]
	payloadP.dyn.pos.My = vecs[3]
	payloadP.dyn.pos.Mz = vecs[4]
	payloadP.dyn.tensor.Ixx = vecs[5]
	payloadP.dyn.tensor.Iyy = vecs[6]
	payloadP.dyn.tensor.Izz = vecs[7]
	payloadP.dyn.tensor.Ixy = vecs[8]
	payloadP.dyn.tensor.Iyz = vecs[9]
	payloadP.dyn.tensor.Ixz = vecs[10]	
end

WaitConvDis_Para={
	{_name="Coord",       _desc ="<CH>动坐标系</CH><EN>SynCoord</EN>",_type="SYNCOORD"},
	{_name="Dis",         _desc ="<CH>增量</CH><EN>Distance(ms)</EN>",_type="REALC",_max=1000000,_min=0,_init=0},
    {_name="Secondname",_desc ="Secondname",_type="str",_init="WaitConvDis",_comm ="<CH>跟随增量等待指令.</CH><EN>Wait increment command.</EN>"},
}
function WaitConvDis(WaitConvDis_Para)
	WaitIsParseAllowed(2,2)  -----参数1：打断方式（1=强制打断，2=可控打断）；参数2：等待到位方式（1=给定到位，2=实际到位）
	local ret = 1
	local Dis
	if type(WaitConvDis_Para.Dis) == "float" or type(WaitConvDis_Para.Dis) == "integer" then
		Dis = WaitConvDis_Para.Dis
	elseif WaitConvDis_Para.Dis._type == "REAL" then
		Dis = WaitConvDis_Para.Dis.value
	else
		ins:setSysError(978)
		ExecStsIsFailed(1)
		return
	end
	if Dis > 1000000 or Dis < 0 then
		ins:setSysError(1022)
		ExecStsIsFailed(1)
		return
	end
	local cnvId = mov:GetCurConveyorId() - 1
	local disStart = mov:GetConveyActPos(cnvId)
	while (ret ~= 0) do
		if  (mov:GetConveyActPos(cnvId) - disStart) >= Dis then	
			ret = 0
		else
			Sleep(1)
	    end
	end
end


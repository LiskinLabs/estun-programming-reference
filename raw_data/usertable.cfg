--位运算指令
BitAnd_Para={
	{_name="operateInt",	_desc ="<CH>需要操作的数据</CH><EN>operateInt</EN>",_type="INT"},
	{_name="compareInt",	_desc ="<CH>需要比较的数据</CH><EN>compareInt</EN>",_type="INT"},	
    {_name="Secondname",_desc ="Secondname",_type="str",_init="BitAnd",_comm ="<CH>按位与操作指令.</CH><EN>The AND operation by bitwise.</EN>"},
}
function BitAnd(BitAnd_Para)
	WaitIsParseAllowed(2,1)  -----参数1：打断方式（1=强制打断，2=可控打断）；参数2：等待到位方式（1=给定到位，2=实际到位）
	local temp = ins:BitOperation(1, BitAnd_Para.operateInt.value, BitAnd_Para.compareInt.value)
	if temp < 0 then
	  ins:setSysError(954)
	  ExecStsIsFailed(1)
	else
	  BitAnd_Para.operateInt.value = temp
	end
end


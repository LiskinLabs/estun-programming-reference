}
function AreaConnectIO(AreaConnectIO_Para)
	WaitIsParseAllowed(1,1)  -----参数1：打断方式（1=强制打断，2=可控打断）；参数2：等待到位方式（1=给定到位，2=实际到位）
	local diPol = 1  -- 1:高 0:低
	if AreaConnectIO_Para.IoPol == "LOW" then
		diPol = 0
	end
	local diType = 0  -- 11:SimDI 0:DI
	if AreaConnectIO_Para.IoType == "SimDI" then
		diType = 11
	end
	
	::begin::
	local ret = mov:AreaConnectIO(AreaConnectIO_Para.Area.id,diType,AreaConnectIO_Para.IoPort,diPol)
	
	if ret ~= true then
		ins:setSysError(964)
	else
		ret = mov:GetAreaConnectIOCmdRes()
		while ret == -1 do
			ret = mov:GetAreaConnectIOCmdRes()
			Sleep(1)
		end
		if ret ~= 0 then
			Sleep(100)
			goto begin
		end
	end
end


	{_name="IntVec",  _desc ="<CH>数据返回值</CH><EN>ResultData</EN>",_type="IntOneArray"},
	{_name="WTime",     _desc ="<CH>检测时间(ms)</CH><EN>Time(ms)</EN>",_type="int",_max=20000,_min=0,_init=100},
	{_name="Ret",        _desc ="<CH>操作返回值</CH><EN>ResultV</EN>",_type="INT"},	
    {_name="Secondname", _desc ="Secondname",_type="str",_init="SkReadI",_comm ="<CH>带检测超时时间的从Socket读整数的指令.</CH><EN>Read info of int type server.</EN>"},
}
function SocketReadInt(SocketReadInt_Para)
	WaitIsParseAllowed(2,1)  -----参数1：打断方式（1=强制打断，2=可控打断）；参数2：等待到位方式（1=给定到位，2=实际到位）
	--需要读取的数据个数一定要小于等于定义的数组的大小
	if SocketReadInt_Para.IntNum > SocketReadInt_Para.IntVec.count then
	    ins:setSysError(962)
		ExecStsIsFailed(1)
	end	
	SocketReadIntCmd(SocketReadInt_Para.socketName.value, SocketReadInt_Para.WTime)
	if ins:GetSocketInstExecSts() == 0 then
	  SocketReadInt_Para.Ret.value = 0
	  local vec = returnDataFromSocket(1) --设置传入的数据类型为int
	  if vec == -1 then
	    SocketReadInt_Para.Ret.value = 1
		return
	  end
	  --判断数据的数量是否合法，避免传入的数据不匹配导致内存溢出。从socket获取的数据数量一定要大于等于需要读取的数据数量，需要读取的数据个数一定要小于等于定义的数组的大小。
	  if #vec < SocketReadInt_Para.IntNum or SocketReadInt_Para.IntNum > SocketReadInt_Para.IntVec.count then
	    SocketReadInt_Para.Ret.value = 1
		return
	  end
	  for i,v in ipairs(vec)
	  do
	    if i <= SocketReadInt_Para.IntNum then
	      SocketReadInt_Para.IntVec.value[i] = v
		else
		  return
		end
	  end
	else
	  SocketReadInt_Para.Ret.value = 1
	  ins:setRobotWarning("Socket read int failed! Please insure communication is connected!", 89003)
	end
end


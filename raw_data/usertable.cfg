WaitCameraDCPOS_Para={
	{_name="WTime",    _desc ="<CH>等待时间(ms)</CH><EN>Time(ms)</EN>",_type="int",_max=20000,_min=0,_init=0},
	{_name="Vision",   _desc ="<CH>相机索引号</CH><EN>VisionIndex</EN>",_type="int",_max=10,_min=0,_init=0},
	{_name="TP",        _desc ="<CH>目标相对位置</CH><EN>RelPos</EN>",_type="DCPOS"},
	{_name="tagID",    _desc ="<CH>目标物体ID值</CH><EN>ObjID</EN>",_type="INT"},
	{_name="Ret",      _desc ="<CH>有效性</CH><EN>IsValid</EN>",_type="INT"},
	{_name="Secondname",_desc ="Secondname",_type="str",_init="WaitCameraDCPOS",_comm ="<CH>等待相机拍照完成，返回点位偏差值.</CH><EN>Wait until camera has take a picture, return point deviation.</EN>"},
}
function WaitCameraDCPOS(WaitCameraDCPOS_Para)
	WaitIsParseAllowed(2,1)
	cam:WaitCamFinished_RI(WaitCameraDCPOS_Para.WTime)
	local timeCount = ins:GetCurSysClk()
	local ret = cam:CheckCamFinished(WaitCameraDCPOS_Para.Vision)
	while ret ~= true do
		Sleep(1) --这里需要延时等待下，否则死循环出错
		ret = cam:CheckCamFinished(WaitCameraDCPOS_Para.Vision)
	end
	if WaitCameraDCPOS_Para.WTime ~= 0 then
		if (ins:GetCurSysClk() - timeCount) >= WaitCameraDCPOS_Para.WTime then  --超时退出，而非获取到拍照结果
			WaitCameraDCPOS_Para.Ret.value = -1
		else
			local tmpresStr = cam:GetCamPos(WaitCameraDCPOS_Para.Vision)
			if tmpresStr ~= nil and tmpresStr ~= "NoPos" then
				local x,y,a,idV
				x,y,a,idV = string.match(tmpresStr,"([+-]?[0-9.]+)_([+-]?[0-9.]+)_([+-]?[0-9.]+)_([+-]?[0-9]+)")
				WaitCameraDCPOS_Para.TP.dx = tonumber(x)
				WaitCameraDCPOS_Para.TP.dy = tonumber(y)
				WaitCameraDCPOS_Para.TP.da = tonumber(a)
				WaitCameraDCPOS_Para.tagID.value = tonumber(idV)
				WaitCameraDCPOS_Para.Ret.value = 1 --获取位置点有效：1
			else
				WaitCameraDCPOS_Para.Ret.value = 0 --获取位置点无效：0
			end		
		end
	else
		local tmpresStr = cam:GetCamPos(WaitCameraDCPOS_Para.Vision)
		if tmpresStr ~= nil and tmpresStr ~= "NoPos" then
			local x,y,a,idV
			x,y,a,idV = string.match(tmpresStr,"([+-]?[0-9.]+)_([+-]?[0-9.]+)_([+-]?[0-9.]+)_([+-]?[0-9]+)")
			WaitCameraDCPOS_Para.TP.dx = tonumber(x)
			WaitCameraDCPOS_Para.TP.dy = tonumber(y)
			WaitCameraDCPOS_Para.TP.da = tonumber(a)
			WaitCameraDCPOS_Para.tagID.value = tonumber(idV)
			WaitCameraDCPOS_Para.Ret.value = 1 --获取位置点有效：1
		else
			WaitCameraDCPOS_Para.Ret.value = -2 --超时时间为0时，获取不到拍照结果
		end
	end
end

--PalletReset 码垛重置指令
PalletReset_Para={
	{_name="PalletName",	_desc ="<CH>码垛名</CH><EN>Pallet</EN>",_type="PALLET"},
	{_name="actPart",	_desc ="<CH>已码工件数</CH><EN>ActPart</EN>",_type="INTC",_max=100000,_min=0,_init=0},
	{_name="Secondname",_desc ="Secondname",_type="str",_init="PaReset",_comm ="<CH>码垛重置指令.</CH><EN>Pallet reset command</EN>"},
}
function PalletReset(PalletReset_Para)
	local actPart
	if type(PalletReset_Para.actPart) == "integer" then
		actPart = PalletReset_Para.actPart
	elseif PalletReset_Para.actPart._type == "INT" then
		actPart = PalletReset_Para.actPart.value
	else
		ins:setSysError(978)
		ExecStsIsFailed(1)
		return
	end
	if actPart > 100000 or actPart < 0 then
		ins:setSysError(1022)
		ExecStsIsFailed(1)
		return
	end
    PalletReset_Para.PalletName.actParts = actPart
    if PalletReset_Para.PalletName.actParts == 0 then
      PalletReset_Para.PalletName.isEmpty = true
      PalletReset_Para.PalletName.isFull = false

	elseif PalletReset_Para.PalletName.actParts >= PalletReset_Para.PalletName.maxParts then
      PalletReset_Para.PalletName.isEmpty = false
      PalletReset_Para.PalletName.isFull = true
	  PalletReset_Para.PalletName.actParts = PalletReset_Para.PalletName.maxParts

	else
	  PalletReset_Para.PalletName.isEmpty = false
      PalletReset_Para.PalletName.isFull = false
	end
	ins:UpdateParamToFile() --由于内存中码垛数据有修改，将该更改同步更新到文件中	
end

--SoftFloatStart 软浮动启动指令
SoftFloatStart_Para={
	{_name="SoftType",	_desc ="<CH>软浮动类型</CH><EN>SoftType</EN>",_type="enum",_init="CART",_enum={"CART"}},
	{_name="Coordinate",	_desc ="<CH>软浮动参考坐标系</CH><EN>Coordinate</EN>",_type="enum",_init="WORLD",_enum={"WORLD","TOOL","USER"},_depends={"SoftTool=010","SoftUser=001"}},
	{_name="SoftTool",	_desc ="<CH>坐标系号</CH><EN>SoftTool</EN>",_type="TOOL"},
	{_name="SoftUser",	_desc ="<CH>坐标系号</CH><EN>SoftUser</EN>",_type="USERCOOR"},
	{_name="SoftDirection",	_desc ="<CH>软浮动方向</CH><EN>SoftDirection</EN>",_type="enum",_init="Y",_enum={"X","Y","Z"}},
	{_name="SoftSensitivity",_desc ="<CH>软浮动灵敏度</CH><EN>SoftSensitivity</EN>",_type="enum",_init="MID",_enum={"HIGH","MidHigh","MID","MidLow","LOW"}},
	{_name="Secondname",_desc ="Secondname",_type="str",_init="SFStart",_comm ="<CH>软浮动开启指令.</CH><EN>SoftFloat function activate command.</EN>"},
}
function SoftFloatStart(SoftFloatStart_Para)
		WaitIsParseAllowed(2,1)  -----参数1：打断方式（1=强制打断，2=可控打断）；参数2：等待到位方式（1=给定到位，2=实际到位）
		local SoftType = 1;
		if SoftFloatStart_Para.SoftType == "CART" then 
			SoftType = 1
		elseif SoftFloatStart_Para.SoftType == "JOINT" then 
			SoftType = 0
		end
		
		local CoordType = 0;
		local arrF={fPoint={}};
		if SoftFloatStart_Para.Coordinate == "WORLD" then 
			CoordType = 0
			arrF.fPoint[1] = 0
			arrF.fPoint[2] = 0
			arrF.fPoint[3] = 0
			arrF.fPoint[4] = 0
			arrF.fPoint[5] = 0
			arrF.fPoint[6] = 0
		elseif SoftFloatStart_Para.Coordinate == "TOOL" then 
			CoordType = 2
			arrF.fPoint[1] = SoftFloatStart_Para.SoftTool.x
			arrF.fPoint[2] = SoftFloatStart_Para.SoftTool.y
			arrF.fPoint[3] = SoftFloatStart_Para.SoftTool.z
			arrF.fPoint[4] = SoftFloatStart_Para.SoftTool.a
			arrF.fPoint[5] = SoftFloatStart_Para.SoftTool.b
			arrF.fPoint[6] = SoftFloatStart_Para.SoftTool.c
		elseif SoftFloatStart_Para.Coordinate == "USER" then 
			CoordType = 1
			arrF.fPoint[1] = SoftFloatStart_Para.SoftUser.x
			arrF.fPoint[2] = SoftFloatStart_Para.SoftUser.y
			arrF.fPoint[3] = SoftFloatStart_Para.SoftUser.z
			arrF.fPoint[4] = SoftFloatStart_Para.SoftUser.a
			arrF.fPoint[5] = SoftFloatStart_Para.SoftUser.b
			arrF.fPoint[6] = SoftFloatStart_Para.SoftUser.c
		end
		
		local Direction = 0;
		if SoftFloatStart_Para.SoftDirection == "X" then --X+:1,X-:2,Y+:3,Y-:4,Z+:5,Z-:6
			Direction = 0
		elseif SoftFloatStart_Para.SoftDirection == "Y" then 
			Direction = 1
		elseif SoftFloatStart_Para.SoftDirection == "Z" then 
			Direction = 2
		end
	
		local Sensitivity = 0;
		if SoftFloatStart_Para.SoftSensitivity == "HIGH" then 
			Sensitivity = 0
		elseif SoftFloatStart_Para.SoftSensitivity == "MidHigh" then 
			Sensitivity = 1
		elseif SoftFloatStart_Para.SoftSensitivity == "MID" then 
			Sensitivity = 2
		elseif SoftFloatStart_Para.SoftSensitivity == "MidLow" then 
			Sensitivity = 3
		elseif SoftFloatStart_Para.SoftSensitivity == "LOW" then 
			Sensitivity = 4
		end
		
		mov:SoftFloatStartRun(SoftType,CoordType,arrF,Direction,Sensitivity)	
		
		local ret = mov:checkSoftFloatFinished()
		while ret ~= true do
			ret = mov:checkSoftFloatFinished()
			Sleep(1) --这里需要延时等待下，否则死循环出错
		end

end

--SoftFloatStop 软浮动结束指令
SoftFloatStop_Para={
	{_name="Secondname",_desc ="Secondname",_type="str",_init="SFStop",_comm ="<CH>软浮动关闭指令.</CH><EN>SoftFloat function deactivate.</EN>"},
}
function SoftFloatStop(SoftFloatStop_Para)
    --WaitIsParseAllowed(2,1)  -----参数1：打断方式（1=强制打断，2=可控打断）；参数2：等待到位方式（1=给定到位，2=实际到位）
	mov:SoftFloatStopRun()
	
	local ret = mov:checkSoftFloatFinished()
	while ret ~= true do
		ret = mov:checkSoftFloatFinished()
		Sleep(1) --这里需要延时等待下，否则死循环出错
	end
		
end


function MSSyncOff(MSSyncOff_Para)
	WaitIsParseAllowed(1,1)  -----参数1：打断方式（1=强制打断，2=可控打断）；参数2：等待到位方式（1=给定到位，2=实际到位）
	if MSSyncOff_Para.SyncId.index == 0 then
		ins:setSysError(1025)
		ExecStsIsFailed(1)
		return
	end
	local enbSts = mov:GetCurMulRobEnSts()
	if enbSts == 0 then
		ins:setSysError(1030)
		ExecStsIsFailed(1)
		return
	end
	
	local robotType = mov:GetCurRobotType()
	if robotType == 1 then		--对当前机器人类型进行判断（1=主机器人，2=从机器人）
		local cmdRes = -1
		::begin::
		local ret = mov:SetMSSyncOff(MSSyncOff_Para.SyncId.index)
		if ret ~= true then
			ins:setSysError(1027)
			ExecStsIsFailed(1)
			return
		else
			while cmdRes == -1 do
				cmdRes = mov:GetMSSyncOffCmdRes()		--主机器人等命令答复
				Sleep(1)
			end
			if cmdRes ~= 0 then
				Sleep(100)
				goto begin
			elseif cmdRes == 0 then
				::signal::
				local instOk = mov:GetMSSyncOffInstOK()	--主机器人等状态答复
				if instOk ~= 1 then
					Sleep(100)
					goto signal
				end
			end
			mov:ResetMSInstSts(2)
		end
	elseif robotType == 2 then 
		local instOk = mov:GetMSSyncOffInstOK()			--从机器人等状态答复
		while instOk ~= 1 do
			instOk = mov:GetMSSyncOffInstOK()
			Sleep(1)
		end
		mov:ResetMSInstSts(2)
	end
end


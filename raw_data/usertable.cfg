--Area指令
AreaActivate_Para={
	{_name="Area",      _desc ="<CH>区域变量</CH><EN>Area</EN>",_type="AREA"},
    {_name="Secondname",_desc ="Secondname",_type="str",_init="AreaA",_comm ="<CH>激活标准区域的指令.</CH><EN>Activate an area.</EN>"},
}
function AreaActivate(AreaActivate_Para)
	WaitIsParseAllowed(1,1)  -----参数1：打断方式（1=强制打断，2=可控打断）；参数2：等待到位方式（1=给定到位，2=实际到位）
	::begin::
	local ret = mov:areaActivateOrNot(AreaActivate_Para.Area.id,1)
	if ret ~= true then
		ins:setSysError(964)
	else
		ret = mov:GetAreaActivateCmdRes()
		while ret == -1 do
			ret = mov:GetAreaActivateCmdRes()
			Sleep(1)
		end
		if ret ~= 0 then
			Sleep(100)
			goto begin
		end
	end
	

end


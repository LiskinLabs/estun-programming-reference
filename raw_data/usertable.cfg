	{_name="SyncId",	_desc ="<CH>协同标识</CH><EN>SyncId</EN>",_type="SYNCID"},
	{_name="P",			_desc ="<CH>目标位置</CH><EN>TargetPos</EN>",_type="POS",_subtype="APOS"},
	{_name="V",			_desc ="<CH>目标速度</CH><EN>Velo</EN>",_type="SPEED",_init="V4000",_scope=0,_state="DEFAULT"},
	{_name="Tool", 		_desc ="<CH>工具参数</CH><EN>Tool</EN>",_type="TOOL",_init="nullTool",_scope=0,_state="DEFAULT"},
	{_name="Coord", 	_desc ="<CH>坐标系参数</CH><EN>Coord</EN>",_type="USERCOOR",_init="World",_scope=0,_state="DEFAULT"},
	{_name="PayLoad",	_desc ="<CH>工件负载</CH><EN>PayLoad</EN>",_type="PAYLOAD",_init="FullPayLoad",_scope=0,_state="DEFAULT"},
	{_name="DO", 		_desc ="AddDo",_type="func"},
	{_name="Secondname",_desc ="Secondname",_type="str",_init="MovMSSyncOn",_comm ="<CH>开启主从协同运动指令.</CH><EN>Enable master slave synchronous motion command.</EN>"},
}
function MovMSSyncOn(MovMSSyncOn_Para)
	--缺省项设定默认值
	if MovMSSyncOn_Para.V == nil then
		MovMSSyncOn_Para.V=t_s.V4000
	end
	if MovMSSyncOn_Para.Tool == nil then
		MovMSSyncOn_Para.Tool = "default"
	end
	if MovMSSyncOn_Para.Coord == nil then
		MovMSSyncOn_Para.Coord = "default"
	end
	if MovMSSyncOn_Para.PayLoad == nil then
		MovMSSyncOn_Para.PayLoad = "default"
	end	
	
	local sGId = 0
	if MovMSSyncOn_Para.MSGroup == nil then
		sGId = -1
	elseif MovMSSyncOn_Para.MSGroup == "MSGroup1" then
		sGId = 1
	elseif MovMSSyncOn_Para.MSGroup == "MSGroup2" then
		sGId = 2
	elseif MovMSSyncOn_Para.MSGroup == "MSGroup3" then
		sGId = 3
	elseif MovMSSyncOn_Para.MSGroup == "MSGroup4" then
		sGId = 4
	elseif MovMSSyncOn_Para.MSGroup == "MSGroup5" then
		sGId = 5
	elseif MovMSSyncOn_Para.MSGroup == "MSGroup6" then
		sGId = 6
	elseif MovMSSyncOn_Para.MSGroup == "MSGroup7" then
		sGId = 7
	end	
	if MovMSSyncOn_Para.SyncId.index == 0 then
		ins:setSysError(1025)
		ExecStsIsFailed(1)
		return
	end
	local enbSts = mov:GetCurMulRobEnSts()
	if enbSts == 0 then
		ins:setSysError(1030)
		ExecStsIsFailed(1)
		return
	end
	local sGp = mov:TransMSGroup(sGId)
	if sGp == -2 then
		ins:setSysError(1026)
		ExecStsIsFailed(1)
		return
	end
	
	local gov = "GOVRON"
	local ret = MSSyncMov(sGp,MovMSSyncOn_Para.SyncId.index,MovMSSyncOn_Para.P,MovMSSyncOn_Para.V,MovMSSyncOn_Para.Tool,MovMSSyncOn_Para.Coord,MovMSSyncOn_Para.PayLoad,gov,MovMSSyncOn_Para.DO)
	while ret ~= 1 do
		ret = MSSyncMov(sGp,MovMSSyncOn_Para.SyncId.index,MovMSSyncOn_Para.P,MovMSSyncOn_Para.V,MovMSSyncOn_Para.Tool,MovMSSyncOn_Para.Coord,MovMSSyncOn_Para.PayLoad,gov,MovMSSyncOn_Para.DO)
		Sleep(1) 	--这里需要延时等待下，否则死循环出错
	end
	WaitIsParseAllowed(1,2)  -----参数1：打断方式（1=强制打断，2=可控打断）；参数2：等待到位方式（1=给定到位，2=实际到位）
	local instOk = mov:GetMSSyncOnInstOK()
	while instOk ~= 1 do
		instOk = mov:GetMSSyncOnInstOK()
		Sleep(1)
	end
	mov:ResetMSInstSts(1)
	SetBreakFlag(1)  --设置断点标志位，影响后面逻辑等指令执行
end

MSSyncOff_Para={
	{_name="SyncId",	_desc ="<CH>协同标识</CH><EN>SyncId</EN>",_type="SYNCID"},
	{_name="Secondname",_desc ="Secondname",_type="str",_init="MSSyncOff",_comm ="<CH>关闭主从协同运动指令.</CH><EN>Disable master slave synchronous motion command.</EN>"},

WaitWObj_Para={
	{_name="Coord",       _desc ="<CH>动坐标系</CH><EN>SynCoord</EN>",_type="SYNCOORD"},
	{_name="PieceId",     _desc ="<CH>工件id</CH><EN>WorkPieceID</EN>",_type="INT"},
	{_name="T",           _desc ="<CH>时长(ms)</CH><EN>Time(ms)</EN>",_type="int",_max=1000000,_min=0,_init=0,_comm ="<CH>0表示无限等待，非0值为正常等待时间</CH><EN>0: infinite wait;  Non-zero: normal wait time</EN>"},
	{_name="Ret",         _desc ="<CH>超时判断值</CH><EN>IsOvertime</EN>",_type="INT"},	
	{_name="Goto",       _desc ="<CH>超时跳转的标签名</CH><EN>LabelName</EN>",_type="label"},
	{_name="Attr",       _desc ="<CH>视觉反馈的Attr</CH><EN>Attr</EN>",_type="INT",_state="DEFAULT"},
	{_name="CamP",       _desc ="<CH>视觉反馈的点位</CH><EN>Camera Pos</EN>",_type="CPOS",_state="DEFAULT"},
    {_name="Secondname",_desc ="Secondname",_type="str",_init="WaitWObj",_comm ="<CH>等待视觉信息输入指令.</CH><EN>Wait 2D signal command.</EN>"},
}
function WaitWObj(WaitWObj_Para)
	WaitIsParseAllowed(2,2)  -----参数1：打断方式（1=强制打断，2=可控打断）；参数2：等待到位方式（1=给定到位，2=实际到位）
	local ret = 1
	local timeCount = ins:GetCurSysClk()
	local cnvId = mov:GetCurConveyorId()
	while (ret ~= 0) do
	  local Value = mov:CheckConveyorIsAllowedMotion(cnvId)
	  if Value == 0 then -----已满足判断条件
	    WaitWObj_Para.Ret.value = 0
		WaitWObj_Para.PieceId.value = mov:getCurWorkPieceId(cnvId)
		if WaitWObj_Para.Attr ~= nil then
			WaitWObj_Para.Attr.value = mov:getCurSyncAttr(cnvId)
		end
		if WaitWObj_Para.CamP ~= nil then
			WaitWObj_Para.CamP.x = mov:getCurCamPos(cnvId, 0)
			WaitWObj_Para.CamP.y = mov:getCurCamPos(cnvId, 1)
			WaitWObj_Para.CamP.z = mov:getCurCamPos(cnvId, 2)
			WaitWObj_Para.CamP.a = mov:getCurCamPos(cnvId, 3)
			WaitWObj_Para.CamP.b = mov:getCurCamPos(cnvId, 4)
			WaitWObj_Para.CamP.c = mov:getCurCamPos(cnvId, 5)
		end
		ret = 0
	  else
	    if WaitWObj_Para.T ~= 0 then
	       if (ins:GetCurSysClk() - timeCount) >= WaitWObj_Para.T then  -----判断条件为超时退出
		      WaitWObj_Para.Ret.value = 1
			  ret = 0
	       end
	    end
	  end
	  Sleep(1) 
	end
	if WaitWObj_Para.Ret.value == 1 and WaitWObj_Para.Goto ~= nil then --超时退出则goto到指定label
		WaitGotoLabel(WaitWObj_Para.Goto)--回调跳转函数
	end	
end


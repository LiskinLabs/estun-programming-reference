    {_name="Secondname", _desc ="Secondname",_type="str",_init="SetJointDamp",_comm ="<CH>开始采集动力学模型辨识数据指令.</CH><EN>Start collect mdl data.</EN>"},
}
function StartMdlLog(StartMdlLog_Para)
	WaitIsParseAllowed(1,1)  -----参数1：打断方式（1=强制打断，2=可控打断）；参数2：等待到位方式（1=给定到位，2=实际到位）
	local dType = 0
	if StartMdlLog_Para.dataType == "Robot" then      --辨识本体、负载或者工具时选择使用
		dType = 1
	elseif StartMdlLog_Para.dataType == "WithLoad" then     --辨识负载或者工具时选择使用
		dType = 2
	elseif StartMdlLog_Para.dataType == "ValidData" then    --辨识本体、负载或者工具时选择使用
		dType = 3
	end
	if erbd:getErbdUsedSts() ~= true then	--检测当前机型能否使用ERBD功能
		ExecStsIsFailed(1)
	end
	mov:StartMdLog(dType)
	local ret = mov:GetErbdLogState() --0空闲;1采集数据中;2文件写成功;3操作失败
	while ret ~= 1 do --待内核接收到采集命令，转入采集数据中状态时开启下一步操作。
		Sleep(1)
		ret = mov:GetErbdLogState()
		if ret == 3 then   --失败则报错
		  ins:setSysError(979)
		  ExecStsIsFailed(1)
		end
	end
end


MSWaitSync_Para={
	{_name="MSGroup",	_desc ="<CH>主从组</CH><EN>MSGroup</EN>",_type="enum",_enum={"MSGroup1","MSGroup2","MSGroup3","MSGroup4","MSGroup5","MSGroup6","MSGroup7"},_state="DEFAULT"},
	{_name="SyncId",	_desc ="<CH>协同标识</CH><EN>SyncId</EN>",_type="SYNCID"},
	{_name="T",			_desc ="<CH>时长(ms)</CH><EN>Time(ms)</EN>",_type="INTC",_max=1000000,_min=0,_init=0,_comm ="<CH>0表示无限等待，非0值为正常等待时间</CH><EN>0: infinite wait;  Non-zero: normal wait time</EN>"},
	{_name="Ret",		_desc ="<CH>超时判断值</CH><EN>IsOvertime</EN>",_type="INT"},	
	{_name="Goto",		_desc ="<CH>超时跳转的标签名</CH><EN>LabelName</EN>",_type="label"},
	{_name="Secondname",_desc ="Secondname",_type="str",_init="MSWaitSync",_comm ="<CH>等待其他机器人协同运动指令.</CH><EN>Wait other robot synchronous motion command.</EN>"},
}
function MSWaitSync(MSWaitSync_Para)
	WaitIsParseAllowed(1,2)  -----参数1：打断方式（1=强制打断，2=可控打断）；参数2：等待到位方式（1=给定到位，2=实际到位）
	local TempTime
	if type(MSWaitSync_Para.T) == "integer" then
		TempTime = MSWaitSync_Para.T
	elseif MSWaitSync_Para.T._type == "INT" then
		TempTime = MSWaitSync_Para.T.value
	else
		ins:setSysError(978)
		ExecStsIsFailed(1)
		return
	end
	
	local sGId = 0
	if MSWaitSync_Para.MSGroup == nil then
		sGId = -1
	elseif MSWaitSync_Para.MSGroup == "MSGroup1" then
		sGId = 1
	elseif MSWaitSync_Para.MSGroup == "MSGroup2" then
		sGId = 2
	elseif MSWaitSync_Para.MSGroup == "MSGroup3" then
		sGId = 3
	elseif MSWaitSync_Para.MSGroup == "MSGroup4" then
		sGId = 4
	elseif MSWaitSync_Para.MSGroup == "MSGroup5" then
		sGId = 5
	elseif MSWaitSync_Para.MSGroup == "MSGroup6" then
		sGId = 6
	elseif MSWaitSync_Para.MSGroup == "MSGroup7" then
		sGId = 7
	end
	if MSWaitSync_Para.SyncId.index == 0 then
		ins:setSysError(1025)
		ExecStsIsFailed(1)
		return
	end
	
	local enbSts = mov:GetCurMulRobEnSts()
	if enbSts == 0 then
		ins:setSysError(1030)
		ExecStsIsFailed(1)
		return
	end
	local sGp = mov:TransMSGroup(sGId)
	if sGp ~= -2 then
		local set = mov:SetMSWaitSync(sGp, MSWaitSync_Para.SyncId.index)
		if set ~= true then
			ins:setSysError(1027)
			ExecStsIsFailed(1)
			return
		end
	else
		ins:setSysError(1026)
		ExecStsIsFailed(1)
		return
	end
	
	local ret = 1
	local timeCount = ins:GetCurSysClk()
	local cmdRes = -1			
	while ret ~= 0 do
		if cmdRes == -1 then
			cmdRes = mov:GetMSWaitSyncCmdRes()
		elseif cmdRes == 0 then
			local instOk = mov:GetMSWaitSyncInstOK()
			if instOk == 1 then
				mov:ResetMSInstSts(3)
				MSWaitSync_Para.Ret.value = 0
				ret = 0
			end
		end
		
		if TempTime ~= 0 and ret ~= 0 then
			if (ins:GetCurSysClk() - timeCount) >= TempTime then  -----判断条件为超时退出
				MSWaitSync_Para.Ret.value = 1
				ret = 0
			end
		end
		Sleep(1) 
	end
	
	if MSWaitSync_Para.Ret.value == 1 and MSWaitSync_Para.Goto ~= nil then --超时退出则goto到指定label
		mov:SetMSWaitSyncTimeOut()
		WaitGotoLabel(MSWaitSync_Para.Goto)--回调跳转函数
	end	
end


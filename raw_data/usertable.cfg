	{_name="Val",	_desc ="<CH>转矩限制值</CH><EN>Torque limit value</EN>", _type="INTC",_max=3000,_min=0,_init=3000},
	{_name="Secondname",_desc ="Secondname",_type="str",_init="SetPosTorLimit",_comm ="<CH>正向转矩限制设置指令.</CH><EN>Positive Torque limit setting command.</EN>"},
}
function SetPosTorLimit(SetPosTorLimit_Para)
	WaitIsParseAllowed(1,1)
	local TempAxis
	if type(SetPosTorLimit_Para.Axis) == "integer" then
		TempAxis = SetPosTorLimit_Para.Axis
	elseif SetPosTorLimit_Para.Axis._type == "INT" then
		TempAxis = SetPosTorLimit_Para.Axis.value
	else
		ins:setSysError(978)
		ExecStsIsFailed(1)
		return
	end
	local PosLimit
	if type(SetPosTorLimit_Para.Val) == "integer" then
		PosLimit = SetPosTorLimit_Para.Val
	elseif SetPosTorLimit_Para.Val._type == "INT" then
		PosLimit = SetPosTorLimit_Para.Val.value
	else
		ins:setSysError(978)
		ExecStsIsFailed(1)
		return
	end
	::begin::
	local ret = mov:SdoWriteCmdInst("TorqP", TempAxis, PosLimit)
	if ret ~= true then
		ins:setSysError(990)
		Sleep(100)		-- 等待错误被处理
		goto begin
	else
		ret = mov:GetSdoWriteCmdInstRes()
		while ret == -1 do
			Sleep(1)
			ret = mov:GetSdoWriteCmdInstRes()
		end
		if ret ~= 0 then
			ins:setSysError(990)
			Sleep(100)
			goto begin
		end
	end
end


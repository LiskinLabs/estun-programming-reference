--PalletToPut 工件放置指令
PalletToPut_Para={
	{_name="PalletName",  _desc ="<CH>码垛名</CH><EN>Pallet</EN>",     _type="PALLET"},
	{_name="V",	          _desc ="<CH>目标速度</CH><EN>Velo</EN>",   _type="SPEED",_init="V4000",_scope=0,_state="DEFAULT"},
	{_name="B",	          _desc ="<CH>过渡类型</CH><EN>BlendType</EN>",_type="enum",_init="FINE",_enum={"FINE","RELATIVE","ABSOLUTE"},_state="DEFAULT",_depends={"C=011"}},
	{_name="C",           _desc ="<CH>过渡值</CH><EN>BlendValue</EN>",_type="ZONE",_init="C100",_scope=0,_state="DEFAULT"},
	{_name="Secondname",  _desc ="Secondname", _type="str",_init="ToPut",_comm ="<CH>工件放置指令.</CH><EN>Place workpiece command.</EN>"},
}
function PalletToPut(PalletToPut_Para)
	--缺省项设定默认值
	if (PalletToPut_Para.V == nil) then
		PalletToPut_Para.V = t_s.V4000
	end
	if (PalletToPut_Para.B == nil) then
		PalletToPut_Para.B = "FINE"
	end
	if (PalletToPut_Para.C == nil) then
		PalletToPut_Para.C = t_s.C100
	end
	if (PalletToPut_Para.B == "FINE") then
		PalletToPut_Para.C = t_s.C0
	end
	
    if PalletToPut_Para.PalletName.actParts < 0 or PalletToPut_Para.PalletName.actParts > PalletToPut_Para.PalletName.maxParts then
	  ins:setSysError(955)
	  ExecStsIsFailed(1)
	  return
	end

    if PalletToPut_Para.PalletName.isFull == true then
	  ins:setSysError(956)
	  ExecStsIsFailed(1)
	  return	  
	end	

	local palletMode, pallPoint, pallPrePoint,pallPosPoint = CalculatePalletPoint(PalletToPut_Para.PalletName, 1)
    local entryMode, entryPos = GetSelectCposValue(PalletToPut_Para.PalletName.palletEntryScope, PalletToPut_Para.PalletName.palletEntryPos)

	local step = ins:GetCurrentStep()
	if step == 0 then
      if PalletToPut_Para.PalletName.isEntryPosUsed == true then

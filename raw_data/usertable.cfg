	{_name="AxisID", _desc ="<CH>轴号</CH><EN>AxisID</EN>",_type="INTC",_max=16,_min=1,_init=1},
	{_name="ComparePointID", _desc ="<CH>比较点的编号</CH><EN>ID of the comparison point</EN>",_type="INTC",_max=8,_min=1,_init=1},
	{_name="RecordLatchID", _desc ="<CH>过渡段记录点的索引</CH><EN>The ID of the transition recording point</EN>",_type="enum",_enum={"LATCH_1","LATCH_2","LATCH_3","LATCH_4","LATCH_5","LATCH_6","LATCH_7","LATCH_8","LATCH_9","LATCH_10","LATCH_11","LATCH_12","LATCH_13","LATCH_14","LATCH_15","LATCH_16","LATCH_17","LATCH_18","LATCH_19","LATCH_20"},_state="DEFAULT"},
	{_name="Ret", _desc ="<CH>有效性</CH><EN>IsValid</EN>",_type="INT"},
	{_name="P", _desc ="<CH>关节位置变量</CH><EN>Apos</EN>",_type="APOS"},
	{_name="Secondname", _desc ="Secondname",_type="str",_init="SetLatchPos",_comm ="<CH>设置指定轴的指定PSO比较点，返回机器人当前关节坐标.</CH><EN>Set the index of PSO comparison points for the specified axis, return robot current joint coordinates.</EN>"},
}
function SetLatchPos(SetLatchPos_Para)
	WaitIsParseAllowed(1,1)  -----参数1：打断方式（1=强制打断，2=可控打断）；参数2：等待到位方式（1=给定到位，2=实际到位）
	SetLatchPos_Para.Ret.value = 0
	local TempAxis
	if type(SetLatchPos_Para.AxisID) == "integer" then
		TempAxis = SetLatchPos_Para.AxisID
	elseif SetLatchPos_Para.AxisID._type == "INT" then
		TempAxis = SetLatchPos_Para.AxisID.value
	else
		ins:setSysError(978)
		ExecStsIsFailed(1)
		return
	end
	local TempPointID
	if type(SetLatchPos_Para.ComparePointID) == "integer" then
		TempPointID = SetLatchPos_Para.ComparePointID
	elseif SetLatchPos_Para.ComparePointID._type == "INT" then
		TempPointID = SetLatchPos_Para.ComparePointID.value
	else
		ins:setSysError(978)
		ExecStsIsFailed(1)
		return
	end

	if SetLatchPos_Para.RecordLatchID == nil then
		local ControlValue = TempPointID * 2^3  --将此值左移3位
		local ret = mov:SdoWriteCmdInst("PSOCtrl", TempAxis, ControlValue)
		if ret ~= true then
			ins:setSysError(1031)   --设置PSO控制字失败
			ExecStsIsFailed(1)
			return
		else
			ret = mov:GetSdoWriteCmdInstRes()
			while ret == -1 do
				Sleep(1)
				ret = mov:GetSdoWriteCmdInstRes()
			end
			if ret ~= 0 then
				ins:setSysError(1031)   --设置PSO控制字失败
				ExecStsIsFailed(1)
				return
			end
		end
		ret = mov:SdoReadCmdInst("PSOSts", TempAxis)
		if ret ~= true then
			ins:setSysError(1032)   --获取PSO状态字失败
			ExecStsIsFailed(1)
			return
		else
			ret = mov:GetSdoReadCmdInstRes()
			while ret == -1 do
				Sleep(1)
				ret = mov:GetSdoReadCmdInstRes()
			end
			if ret ~= 0 then
				ins:setSysError(1032)   --获取PSO状态字失败
				ExecStsIsFailed(1)
				return
			end
		end
		local tmpdata = mov:GetSdoReadCmdInstData()
		if tmpdata ~= ControlValue then
			ins:setSysError(1032)   --获取PSO状态字失败
			ExecStsIsFailed(1)
			return
		else
			SetLatchPos_Para.P.a1 = mov:GetSelectCurJ(1)
			SetLatchPos_Para.P.a2 = mov:GetSelectCurJ(2)
			SetLatchPos_Para.P.a3 = mov:GetSelectCurJ(3)
			SetLatchPos_Para.P.a4 = mov:GetSelectCurJ(4)
			SetLatchPos_Para.P.a5 = mov:GetSelectCurJ(5)
			SetLatchPos_Para.P.a6 = mov:GetSelectCurJ(6)
			SetLatchPos_Para.P.a7 = mov:GetSelectCurJ(7)
			SetLatchPos_Para.P.a8 = mov:GetSelectCurJ(8)
			SetLatchPos_Para.P.a9 = mov:GetSelectCurJ(9)
			SetLatchPos_Para.P.a10 = mov:GetSelectCurJ(10)
			SetLatchPos_Para.P.a11 = mov:GetSelectCurJ(11)
			SetLatchPos_Para.P.a12 = mov:GetSelectCurJ(12)
			SetLatchPos_Para.P.a13 = mov:GetSelectCurJ(13)
			SetLatchPos_Para.P.a14 = mov:GetSelectCurJ(14)
			SetLatchPos_Para.P.a15 = mov:GetSelectCurJ(15)
			SetLatchPos_Para.P.a16 = mov:GetSelectCurJ(16)
			SetLatchPos_Para.Ret.value = 1
		end
	else
		local TempRecordStr = string.sub(SetLatchPos_Para.RecordLatchID,7)
		local TempRecordID = tonumber(TempRecordStr)
		local ret2 = mov:SetLatchPos(TempAxis, TempPointID, TempRecordID)
		if ret2 ~= true then
			ins:setSysError(1034)   --设置PSO比较点命令执行失败
			ExecStsIsFailed(1)
			return
		else
			ret2 = mov:GetLatchPosResult()
			while ret2 == -1 do
				Sleep(1)
				ret2 = mov:GetLatchPosResult()
			end
			if ret2 ~= 0 then
				ins:setSysError(1034)   --获取PSO状态字失败
				ExecStsIsFailed(1)
				return
			end
			UpdataAPOS(SetLatchPos_Para.P)
			SetLatchPos_Para.Ret.value = 1
		end
	end	
end

--设置PSO控制字禁能
function PSOCtrlDisable(AxisID)
	local ret = mov:SdoWriteCmdInst("PSOCtrl", AxisID, 0)
	if ret ~= true then
		return false
	else
		ret = mov:GetSdoWriteCmdInstRes()
		while ret == -1 do
			Sleep(1)
			ret = mov:GetSdoWriteCmdInstRes()
		end
		if ret ~= 0 then
			return false
		end
	end
	return true
end
SetLatchPosAttr_Para={
	{_name="AxisID", _desc ="<CH>轴号</CH><EN>AxisID</EN>",_type="INTC",_max=16,_min=1,_init=1},
	{_name="ComparePointID", _desc ="<CH>比较点的编号</CH><EN>ID of the comparison point</EN>",_type="INTC",_max=8,_min=1,_init=1},
	{_name="Attribute", _desc ="<CH>比较点的属性</CH><EN>Attribute of the comparison point</EN>",_type="enum",_init="NORMAL",_enum={"NORMAL","SKIP"}},
	{_name="Secondname", _desc ="Secondname",_type="str",_init="SetLatchPosAttr",_comm ="<CH>设置指定轴的指定PSO比较点的属性，决定正常触发还是跳过该比较点.</CH><EN>Set the attribute of specified PSO comparison points for the specified axis, decide whether to trigger normally or skip the comparison point.</EN>"},
}
function SetLatchPosAttr(SetLatchPosAttr_Para)
	WaitIsParseAllowed(1,1)  -----参数1：打断方式（1=强制打断，2=可控打断）；参数2：等待到位方式（1=给定到位，2=实际到位）
	local TempAxis
	if type(SetLatchPosAttr_Para.AxisID) == "integer" then
		TempAxis = SetLatchPosAttr_Para.AxisID
	elseif SetLatchPosAttr_Para.AxisID._type == "INT" then
		TempAxis = SetLatchPosAttr_Para.AxisID.value
	else
		ins:setSysError(978)
		ExecStsIsFailed(1)
		return
	end
	local TempPointID = 0
	if type(SetLatchPosAttr_Para.ComparePointID) == "integer" then
		TempPointID = SetLatchPosAttr_Para.ComparePointID
	elseif SetLatchPosAttr_Para.ComparePointID._type == "INT" then
		TempPointID = SetLatchPosAttr_Para.ComparePointID.value
	else
		ins:setSysError(978)
		ExecStsIsFailed(1)
		return
	end
	local TempPnParam = "Pn"
	local TempPnNum = 0
	local TempPnNumStr = ""
	if TempPointID > 0 then
		TempPnNum = 609 + 2 * (TempPointID - 1)
		TempPnNumStr = tostring(TempPnNum)
	else
		ins:setSysError(978)
		ExecStsIsFailed(1)
		return
	end
	TempPnParam = TempPnParam..TempPnNumStr
	local TempAttr = 0
	if SetLatchPosAttr_Para.Attribute == "NORMAL" then
		TempAttr = 3
	end
	local ret = PSOCtrlDisable(TempAxis)  --设置属性前需要先禁能
	if ret ~= true then
		ins:setSysError(1031)   --设置PSO控制字失败
		ExecStsIsFailed(1)
		return
	end
	ret = mov:SdoWriteCmdInst(TempPnParam, TempAxis, TempAttr)
	if ret ~= true then
		ins:setSysError(1033)   --设置PSO比较点属性失败
		ExecStsIsFailed(1)
		return
	else
		ret = mov:GetSdoWriteCmdInstRes()
		while ret == -1 do
			Sleep(1)
			ret = mov:GetSdoWriteCmdInstRes()
		end
		if ret ~= 0 then
			ins:setSysError(1033)   --设置PSO比较点属性失败
			ExecStsIsFailed(1)
			return
		end
	end
end



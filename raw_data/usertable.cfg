    {_name="Secondname",_desc ="Secondname",_type="str",_init="GetMatrix",_comm ="<CH>四点法取矩阵点.</CH><EN>Get Matrix command.</EN>"},
}
function GetMatrixFourP(GetMatrixFourP_Para)
	local rownum
	local columnum
	local actrownum=Matrix_four_point_Table[5]
	local actcolumnum=Matrix_four_point_Table[6]
	local halfactrownum=actrownum/2
	local halfactcolumnum=actcolumnum/2
	if type(GetMatrixFourP_Para.Row) == "integer" then
		rownum = GetMatrixFourP_Para.Row
	elseif GetMatrixFourP_Para.Row._type == "INT" then
		rownum = GetMatrixFourP_Para.Row.value
	else
	   	ins:setSysError(978)
		ExecStsIsFailed(1)
	end
	if type(GetMatrixFourP_Para.Column) == "integer" then
		columnum = GetMatrixFourP_Para.Column
	elseif GetMatrixFourP_Para.Column._type == "INT" then
		columnum = GetMatrixFourP_Para.Column.value
	else
	   	ins:setSysError(978)
		ExecStsIsFailed(1)
	end
	if rownum<=0 or columnum<=0 then
		ins:setSysError(971)
		ExecStsIsFailed(1)
	end
	if (rownum>actrownum) or (columnum>actcolumnum) then
		ins:setSysError(972)
		ExecStsIsFailed(1)	
	end
	GetMatrixFourP_Para.TarPos.confdata.mode = -1  --默认使用当前mode值
	--分为四个区域，靠近原点为区域1，靠近对角点为区域3，从区域1顺时针为区域2
	--行数和列数均为1
	if rownum==1 and columnum==1 then
		GetMatrixFourP_Para.TarPos.x=Matrix_four_point_Table.PHome.x
		GetMatrixFourP_Para.TarPos.y=Matrix_four_point_Table.PHome.y
		GetMatrixFourP_Para.TarPos.z=Matrix_four_point_Table.PHome.z
	end
	--行数为1，列数大于1
	if rownum==1 and columnum>1 and columnum<actcolumnum then
		GetMatrixFourP_Para.TarPos.x=Matrix_four_point_Table.PHome.x+(columnum-1)*(Matrix_four_point_Table.PRow.x-Matrix_four_point_Table.PHome.x)/(actcolumnum-1)
		GetMatrixFourP_Para.TarPos.y=Matrix_four_point_Table.PHome.y+(columnum-1)*(Matrix_four_point_Table.PRow.y-Matrix_four_point_Table.PHome.y)/(actcolumnum-1)
		GetMatrixFourP_Para.TarPos.z=Matrix_four_point_Table.PHome.z+(columnum-1)*(Matrix_four_point_Table.PRow.z-Matrix_four_point_Table.PHome.z)/(actcolumnum-1)
	end
	--行数大于1，列数为1
	if rownum>1 and columnum==1 and rownum<actrownum then
		GetMatrixFourP_Para.TarPos.x=Matrix_four_point_Table.PHome.x+(rownum-1)*(Matrix_four_point_Table.PColumn.x-Matrix_four_point_Table.PHome.x)/(actrownum-1)
		GetMatrixFourP_Para.TarPos.y=Matrix_four_point_Table.PHome.y+(rownum-1)*(Matrix_four_point_Table.PColumn.y-Matrix_four_point_Table.PHome.y)/(actrownum-1)
		GetMatrixFourP_Para.TarPos.z=Matrix_four_point_Table.PHome.z+(rownum-1)*(Matrix_four_point_Table.PColumn.z-Matrix_four_point_Table.PHome.z)/(actrownum-1)
	end
	--行数为max，列数大于1
	if rownum==actrownum and columnum>=1 and columnum<actcolumnum then
		GetMatrixFourP_Para.TarPos.x=Matrix_four_point_Table.PColumn.x+(columnum-1)*(Matrix_four_point_Table.PDiagonal.x-Matrix_four_point_Table.PColumn.x)/(actcolumnum-1)
		GetMatrixFourP_Para.TarPos.y=Matrix_four_point_Table.PColumn.y+(columnum-1)*(Matrix_four_point_Table.PDiagonal.y-Matrix_four_point_Table.PColumn.y)/(actcolumnum-1)
		GetMatrixFourP_Para.TarPos.z=Matrix_four_point_Table.PColumn.z+(columnum-1)*(Matrix_four_point_Table.PDiagonal.z-Matrix_four_point_Table.PColumn.z)/(actcolumnum-1)
	end
	--行数大于1，列数为max
	if rownum>=1 and columnum==actcolumnum and rownum<=actrownum then
		GetMatrixFourP_Para.TarPos.x=Matrix_four_point_Table.PRow.x+(rownum-1)*(Matrix_four_point_Table.PDiagonal.x-Matrix_four_point_Table.PRow.x)/(actrownum-1)
		GetMatrixFourP_Para.TarPos.y=Matrix_four_point_Table.PRow.y+(rownum-1)*(Matrix_four_point_Table.PDiagonal.y-Matrix_four_point_Table.PRow.y)/(actrownum-1)
		GetMatrixFourP_Para.TarPos.z=Matrix_four_point_Table.PRow.z+(rownum-1)*(Matrix_four_point_Table.PDiagonal.z-Matrix_four_point_Table.PRow.z)/(actrownum-1)
	end
	--区域1内
	if rownum>1 and columnum>1 and rownum<=halfactrownum and columnum<=halfactcolumnum then
		GetMatrixFourP_Para.TarPos.x=Matrix_four_point_Table.PHome.x+((Matrix_four_point_Table.PColumn.x-Matrix_four_point_Table.PHome.x)/(actrownum-1))*(rownum-1)+((Matrix_four_point_Table.PRow.x-Matrix_four_point_Table.PHome.x)/(actcolumnum-1))*(columnum-1)
		GetMatrixFourP_Para.TarPos.y=Matrix_four_point_Table.PHome.y+((Matrix_four_point_Table.PColumn.y-Matrix_four_point_Table.PHome.y)/(actrownum-1))*(rownum-1)+((Matrix_four_point_Table.PRow.y-Matrix_four_point_Table.PHome.y)/(actcolumnum-1))*(columnum-1)
		GetMatrixFourP_Para.TarPos.z=Matrix_four_point_Table.PHome.z+((Matrix_four_point_Table.PColumn.z-Matrix_four_point_Table.PHome.z)/(actrownum-1))*(rownum-1)+((Matrix_four_point_Table.PRow.z-Matrix_four_point_Table.PHome.z)/(actcolumnum-1))*(columnum-1)
	end
	--区域2内
	if rownum<actrownum and columnum>1 and rownum>halfactrownum and columnum<=halfactcolumnum then
        GetMatrixFourP_Para.TarPos.x=Matrix_four_point_Table.PColumn.x+((Matrix_four_point_Table.PHome.x-Matrix_four_point_Table.PColumn.x)/(actrownum-1))*(actrownum-rownum)+((Matrix_four_point_Table.PDiagonal.x-Matrix_four_point_Table.PColumn.x)/(actcolumnum-1))*(columnum-1)
		GetMatrixFourP_Para.TarPos.y=Matrix_four_point_Table.PColumn.y+((Matrix_four_point_Table.PHome.y-Matrix_four_point_Table.PColumn.y)/(actrownum-1))*(actrownum-rownum)+((Matrix_four_point_Table.PDiagonal.y-Matrix_four_point_Table.PColumn.y)/(actcolumnum-1))*(columnum-1)
		GetMatrixFourP_Para.TarPos.z=Matrix_four_point_Table.PColumn.z+((Matrix_four_point_Table.PHome.z-Matrix_four_point_Table.PColumn.z)/(actrownum-1))*(actrownum-rownum)+((Matrix_four_point_Table.PDiagonal.z-Matrix_four_point_Table.PColumn.z)/(actcolumnum-1))*(columnum-1)
	end
	--区域3内
	if rownum<actrownum and columnum<actcolumnum and rownum>halfactrownum and columnum>halfactcolumnum then
        GetMatrixFourP_Para.TarPos.x=Matrix_four_point_Table.PDiagonal.x+((Matrix_four_point_Table.PRow.x-Matrix_four_point_Table.PDiagonal.x)/(actrownum-1))*(actrownum-rownum)+((Matrix_four_point_Table.PColumn.x-Matrix_four_point_Table.PDiagonal.x)/(actcolumnum-1))*(actcolumnum-columnum)
		GetMatrixFourP_Para.TarPos.y=Matrix_four_point_Table.PDiagonal.y+((Matrix_four_point_Table.PRow.y-Matrix_four_point_Table.PDiagonal.y)/(actrownum-1))*(actrownum-rownum)+((Matrix_four_point_Table.PColumn.y-Matrix_four_point_Table.PDiagonal.y)/(actcolumnum-1))*(actcolumnum-columnum)
		GetMatrixFourP_Para.TarPos.z=Matrix_four_point_Table.PDiagonal.z+((Matrix_four_point_Table.PRow.z-Matrix_four_point_Table.PDiagonal.z)/(actrownum-1))*(actrownum-rownum)+((Matrix_four_point_Table.PColumn.z-Matrix_four_point_Table.PDiagonal.z)/(actcolumnum-1))*(actcolumnum-columnum)
	end
	--区域4内
	if rownum>1 and columnum<actcolumnum and rownum<=halfactrownum and columnum>halfactcolumnum then
        GetMatrixFourP_Para.TarPos.x=Matrix_four_point_Table.PRow.x+((Matrix_four_point_Table.PDiagonal.x-Matrix_four_point_Table.PRow.x)/(actrownum-1))*(rownum-1)+((Matrix_four_point_Table.PHome.x-Matrix_four_point_Table.PRow.x)/(actcolumnum-1))*(actcolumnum-columnum)
		GetMatrixFourP_Para.TarPos.y=Matrix_four_point_Table.PRow.y+((Matrix_four_point_Table.PDiagonal.y-Matrix_four_point_Table.PRow.y)/(actrownum-1))*(rownum-1)+((Matrix_four_point_Table.PHome.y-Matrix_four_point_Table.PRow.y)/(actcolumnum-1))*(actcolumnum-columnum)
		GetMatrixFourP_Para.TarPos.z=Matrix_four_point_Table.PRow.z+((Matrix_four_point_Table.PDiagonal.z-Matrix_four_point_Table.PRow.z)/(actrownum-1))*(rownum-1)+((Matrix_four_point_Table.PHome.z-Matrix_four_point_Table.PRow.z)/(actcolumnum-1))*(actcolumnum-columnum)
	end
	--姿态和附加轴的值均保持与P1（PHome）点一致	
	GetMatrixFourP_Para.TarPos.a=Matrix_four_point_Table.PHome.a	
	GetMatrixFourP_Para.TarPos.b=Matrix_four_point_Table.PHome.b
	GetMatrixFourP_Para.TarPos.c=Matrix_four_point_Table.PHome.c
	GetMatrixFourP_Para.TarPos.a7=Matrix_four_point_Table.PHome.a7
	GetMatrixFourP_Para.TarPos.a8=Matrix_four_point_Table.PHome.a8
	GetMatrixFourP_Para.TarPos.a9=Matrix_four_point_Table.PHome.a9
	GetMatrixFourP_Para.TarPos.a10=Matrix_four_point_Table.PHome.a10
	GetMatrixFourP_Para.TarPos.a11=Matrix_four_point_Table.PHome.a11
	GetMatrixFourP_Para.TarPos.a12=Matrix_four_point_Table.PHome.a12
	GetMatrixFourP_Para.TarPos.a13=Matrix_four_point_Table.PHome.a13
	GetMatrixFourP_Para.TarPos.a14=Matrix_four_point_Table.PHome.a14
	GetMatrixFourP_Para.TarPos.a15=Matrix_four_point_Table.PHome.a15
	GetMatrixFourP_Para.TarPos.a16=Matrix_four_point_Table.PHome.a16
end
ChirpExcit_Para={
	{_name="axisID",   _desc ="<CH>轴ID</CH><EN>Axis id</EN>",_type="int",_max=16,_min=1,_init=1,},
	{_name="chirpParam",  _desc ="<CH>chirp参数</CH><EN>chirp Param</EN>",_type="CHIRP"},
    {_name="Secondname", _desc ="Secondname",_type="str",_init="ChirpExcit",_comm ="<CH>设置伺服参数增益指令.</CH><EN>Set servo gain parameter.</EN>"},
}
function ChirpExcit(ChirpExcit_Para)
    local ret = MovChirpExcit(ChirpExcit_Para.axisID,ChirpExcit_Para.chirpParam)
	while ret ~= 1 do
	     ret = MovChirpExcit(ChirpExcit_Para.axisID,ChirpExcit_Para.chirpParam)
		 Sleep(1) --这里需要延时等待下，否则死循环出错
	end
	SetBreakFlag(1)  --设置断点标志位，影响后面逻辑等指令执行
	--强制打断和后面的过渡
	WaitIsParseAllowed(1,1)  -----参数1：打断方式（1=强制打断，2=可控打断）；参数2：等待到位方式（1=给定到位，2=实际到位）
end

SetDampAcclimit_Para={
	{_name="acclimit",  _desc ="<CH>acclimit参数</CH><EN>acclimit Param</EN>",_type="real",_max=200,_min=0,_init=1},
    {_name="Secondname", _desc ="Secondname",_type="str",_init="ChirpExcit",_comm ="<CH>设置Damping加速度限制系数.</CH><EN>Set Damping Acc Limit parameter.</EN>"},
}
function SetDampAcclimit(SetDampAcclimit_Para)
	WaitIsParseAllowed(2,1)  -----参数1：打断方式（1=强制打断，2=可控打断）；参数2：等待到位方式（1=给定到位，2=实际到位）
	::begin::
	local ret = mov:SetDampAcclmtParam(SetDampAcclimit_Para.acclimit)
	if ret ~= true then
		ins:setSysError(975)
	else
		ret = mov:GetDampAccParamCmdRes()
		while ret == -1 do
			ret = mov:GetDampAccParamCmdRes()
			Sleep(1)
		end
		if ret ~= 0 then
			Sleep(100)
			goto begin
		end
	end

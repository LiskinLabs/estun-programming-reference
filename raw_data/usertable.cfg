	{_name="h2",       _desc ="<CH>抬起高度</CH><EN>Up Hight</EN>",_type="real",_max=350,_min=0,_init=0},
	{_name="suckport1",_desc ="<CH>吸气IO</CH><EN>Blow IO</EN>",_type="DO"},

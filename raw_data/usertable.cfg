function Tracking(Tracking_Para)
    WaitIsParseAllowed(1,1)  -----参数1：打断方式（1=强制打断，2=可控打断）；参数2：等待到位方式（1=给定到位，2=实际到位）
	local ret = mov:GetTrackObjState()
	while ret ~= true do
		ret = mov:GetTrackObjState()
		Sleep(1) --这里需要延时等待下，否则死循环出错
	end
	Tracking_Para.Objid.value=mov:GetTrackObjID()
	local trackfailflag=false
	mov:TrackStart(Tracking_Para.h1)
	Sleep(100)
	local ret=mov:GetStartTrackState()
	while ret ~= true do
		ret = mov:GetStartTrackState()
		Sleep(1) --这里需要延时等待下，否则死循环出错
	end
	trackfailflag=mov:CheckTrackState()
	if(trackfailflag==true) then
		Tracking_Para.R.value=1
		do return end
	end
	mov:SetDO(Tracking_Para.suckport1.port,1)
	mov:SetDO(Tracking_Para.suckport2.port,0)
	mov:TrackCatch()
	ret=mov:GetTrackCatchState()
	while ret ~= true do
		ret = mov:GetTrackCatchState()
		Sleep(1) --这里需要延时等待下，否则死循环出错
	end
	trackfailflag=mov:CheckTrackState()
	if(trackfailflag==true) then
		Tracking_Para.R.value=2
		mov:SetDO(Tracking_Para.suckport1.port,0)
		mov:SetDO(Tracking_Para.suckport2.port,0)
		do return end
	end
	mov:TrackRaise(Tracking_Para.h2)
	ret=mov:GetTrackRaiseState()
	while ret ~= true do
		ret = mov:GetTrackRaiseState()
		Sleep(1) --这里需要延时等待下，否则死循环出错
	end
	trackfailflag=mov:CheckTrackState()
	if(trackfailflag==true) then
		Tracking_Para.R.value=3
		mov:SetDO(Tracking_Para.suckport1.port,0)
		mov:SetDO(Tracking_Para.suckport2.port,0)
		do return end
	end
	Tracking_Para.R.value=0
end

-- 根据传入的cpos点变量名，获取点坐标并放到数组中返回
function GetSelectCposValue(scope, str)
    local posStr = ins:GetCposValue(scope, str)
	if posStr == "" then
	  ins:setSysError(958)
	  ExecStsIsFailed(1)
	end
	local pos = {}
	local mode = {}
    local begin, endIndex = string.find(posStr, ",")
	local index = 1
	local lastStartPos = 1
	while true do
	  if begin == nil then
	    if index > 1 then
		  pos[index] = tonumber(string.sub(posStr,lastStartPos))
		end
        break
	  end
	  local strr = string.sub(posStr,lastStartPos,begin-1)
	  lastStartPos = begin + 1
	  -- 由于mode值变成数据结构，故取值时需要把mode与坐标值分开读取。目前mode值为7个数，故以7为分割线(add by lww 20181212)
	  if index < 8 then
	    mode[index] = tonumber(strr)
	  else
        pos[index - 7] = tonumber(strr)
	  end
	  index = index + 1
      begin, endIndex = string.find(posStr, ",", endIndex+1)
	end
	pos[0] = 0
	mode[0] = 0
	return mode, pos
end

-- 根据传入的参数计算三个码垛辅助点的坐标，并通过table表返回
function CalculatePalletPoint(PalletPara, addValue)
	local pallPoint={}
	local pallPrePoint={}
	local pallPosPoint={}
	local dir
	local xSideDir
	local ySideDir
	if PalletPara.palletDir == 1 then
	  dir = -1
	else
	  dir = 1
	end

	if PalletPara.xdistOfPart > 0 then 
	  xSideDir = 1
	else
	  xSideDir = -1
	end

	if PalletPara.ydistOfPart > 0 then 
	  ySideDir = 1
	else
	  ySideDir = -1
	end

	local actPart = PalletPara.actParts + addValue
	local n = actPart % (PalletPara.xNum* PalletPara.yNum)
	local xCount,yCount,zCount
	if n == 0 then
	  zCount = floor(actPart / (PalletPara.xNum* PalletPara.yNum))
      yCount = PalletPara.yNum
      xCount = PalletPara.xNum
	else
	  zCount = floor(actPart / (PalletPara.xNum* PalletPara.yNum) + 1)
	  if  PalletPara.palletOrder == 0 then  --XYZ方向
        if n % PalletPara.xNum== 0 then
          yCount = floor(n / PalletPara.xNum)
          xCount = PalletPara.xNum
        else
		  yCount = floor(n / PalletPara.xNum) + 1
          xCount = n % PalletPara.xNum
	    end
	  elseif  PalletPara.palletOrder == 1 then  --YXZ方向
        if n % PalletPara.yNum == 0 then
          xCount = floor(n / PalletPara.yNum)
          yCount = PalletPara.yNum
        else
		  xCount = floor(n / PalletPara.yNum + 1)
          yCount = n % PalletPara.yNum
	    end
	  end
	end

	local posMode, firstPos = GetSelectCposValue(PalletPara.firstPartScope, PalletPara.firstPartPos)
	pallPoint[0] = firstPos[0]
	pallPoint[1] = firstPos[1] + (xCount - 1) * PalletPara.xdistOfPart
	pallPoint[2] = firstPos[2] + (yCount - 1) * PalletPara.ydistOfPart
	pallPoint[3] = firstPos[3] + (zCount - 1) * PalletPara.zdistOfPart
	if xCount == 1 and yCount == 1 then
	  pallPrePoint[1] = pallPoint[1]
	  pallPrePoint[2] = pallPoint[2]
      pallPrePoint[3] = pallPoint[3] + PalletPara.preplaceOptions.height * dir
	  pallPosPoint[1] = pallPoint[1]
	  pallPosPoint[2] = pallPoint[2]
      pallPosPoint[3] = pallPoint[3] + PalletPara.postplaceOptions.height * dir		
	else
	  if xCount ~= 1 and yCount ~= 1 then
	    pallPrePoint[1] = pallPoint[1] + PalletPara.preplaceOptions.sideOffset * xSideDir
	    pallPrePoint[2] = pallPoint[2] + PalletPara.preplaceOptions.sideOffset * ySideDir
		pallPrePoint[3] = pallPoint[3] + PalletPara.preplaceOptions.height * dir
	  elseif xCount == 1 and yCount ~= 1 then
	    pallPrePoint[1] = pallPoint[1]
	    pallPrePoint[2] = pallPoint[2] + PalletPara.preplaceOptions.sideOffset * ySideDir
		pallPrePoint[3] = pallPoint[3] + PalletPara.preplaceOptions.height * dir
	  elseif xCount ~= 1 and yCount == 1 then
	    pallPrePoint[1] = pallPoint[1] + PalletPara.preplaceOptions.sideOffset * xSideDir
	    pallPrePoint[2] = pallPoint[2]
		pallPrePoint[3] = pallPoint[3] + PalletPara.preplaceOptions.height * dir
	  end
	    pallPosPoint[1] = pallPoint[1] + PalletPara.postplaceOptions.sideOffset
	    pallPosPoint[2] = pallPoint[2] + PalletPara.postplaceOptions.sideOffset
		pallPosPoint[3] = pallPoint[3] + PalletPara.postplaceOptions.height * dir	
	end
	
	pallPoint[4] = firstPos[4]
	pallPoint[5] = firstPos[5]
	pallPoint[6] = firstPos[6]
	pallPoint[7] = firstPos[7]
	pallPoint[8] = firstPos[8]	

	pallPrePoint[0] = firstPos[0]
	pallPosPoint[0] = firstPos[0]	

	for i=4,8,1 do
	  pallPrePoint[i] = pallPoint[i]
	  pallPosPoint[i] = pallPoint[i]
	end

	return posMode, pallPoint, pallPrePoint, pallPosPoint
end


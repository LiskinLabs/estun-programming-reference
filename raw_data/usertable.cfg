GetMatrix_Para={
	{_name="Row",     _desc ="<CH>行数</CH><EN>Row</EN>",_type="INT"},
	{_name="Column",     _desc ="<CH>列数</CH><EN>Column</EN>",_type="INT"},
	{_name="TarPos",     _desc ="<CH>目标点</CH><EN>TarPos</EN>",_type="CPOS"},
    {_name="Secondname",_desc ="Secondname",_type="str",_init="GetMatrix",_comm ="<CH>取矩阵点.</CH><EN>Get Matrix command.</EN>"},
}
function GetMatrix(GetMatrix_Para)
	local rownum=GetMatrix_Para.Row.value
	local columnum=GetMatrix_Para.Column.value
	local actrownum=Matrix_Table[4]
	local actcolumnum=Matrix_Table[5]
	
	if rownum<=0 or columnum<=0 then
		ins:setSysError(971)
		ExecStsIsFailed(1)
	end
	
	if (rownum>actrownum) or (columnum>actcolumnum) then
		ins:setSysError(972)
		ExecStsIsFailed(1)	
	end
	
	GetMatrix_Para.TarPos.confdata.mode = -1  --默认使用当前mode值
	
	--行数和列数均为1
	if rownum==1 and columnum==1 then
		GetMatrix_Para.TarPos.x=Matrix_Table.PHome.x
		GetMatrix_Para.TarPos.y=Matrix_Table.PHome.y
		GetMatrix_Para.TarPos.z=Matrix_Table.PHome.z
	end
	--行数为1，列数大于1
	if rownum==1 and columnum>1 then
		GetMatrix_Para.TarPos.x=Matrix_Table.PHome.x+(columnum-1)*(Matrix_Table.PRow.x-Matrix_Table.PHome.x)/(actcolumnum-1)
		GetMatrix_Para.TarPos.y=Matrix_Table.PHome.y+(columnum-1)*(Matrix_Table.PRow.y-Matrix_Table.PHome.y)/(actcolumnum-1)
		GetMatrix_Para.TarPos.z=Matrix_Table.PHome.z+(columnum-1)*(Matrix_Table.PRow.z-Matrix_Table.PHome.z)/(actcolumnum-1)
	end
	--行数大于1，列数为1
	if rownum>1 and columnum==1 then
		GetMatrix_Para.TarPos.x=Matrix_Table.PHome.x+(rownum-1)*(Matrix_Table.PColumn.x-Matrix_Table.PHome.x)/(actrownum-1)
		GetMatrix_Para.TarPos.y=Matrix_Table.PHome.y+(rownum-1)*(Matrix_Table.PColumn.y-Matrix_Table.PHome.y)/(actrownum-1)

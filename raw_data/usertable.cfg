-- 根据传入的坐标点以及速度，转换成指令数据表返回
function GetMotionInst(pos, mode, speed)
	local inst = {targetP={}, targetSpeed={}, modeCfg={}}
	--motion type
	inst.motType = 2 --LINE
	--coordinate type
	inst.coordType = 1 --PCS
	--target position
	for i = 1, #pos, 1 do
	  inst.targetP[i] = pos[i]
	end

	for i = 1, #mode, 1 do
	  inst.modeCfg[i] = mode[i]
	end

    inst.targetPointType = 1

	--velocity
	inst.targetSpeed[1] = speed.per
	inst.targetSpeed[2] = speed.tcp
	inst.targetSpeed[3] = speed.ori
	inst.targetSpeed[4] = speed.exj_l
	inst.targetSpeed[5] = speed.exj_r
    inst.velType = 1   --0:(%);1:(mm/s)
	--blend
    inst.blendType = 1
	inst.blend = 0	

	--Trig
	inst.TrigType = 0
	inst.TrigNum = 0
	inst.TrigValue = 0

    inst.adddo = ""
	return inst
end


function table.length(t) --lua中的表无法直接用#来判断大小，需要封装该函数来获取表中的数据个数
	local i = 0
	for k, v in pairs(t) do
		i = i + 1
	end
	return i
end

function SplitStr(srcStr, splitStr)
	local start = 1
	local index = 0
	local strVec = {}
	while true do
		local pos = string.find(srcStr, splitStr, start, true)
		if not pos then
			break
		elseif pos == 1 then
			start = pos + string.len(splitStr)
		else
			local tempStr = string.sub(srcStr, start, pos - 1)
			if tempStr == "" then
				return strVec
			end
			strVec[index] = tempStr
			index = index + 1
			start = pos + string.len(splitStr)	
		end
	end
	strVec[index] = string.sub(srcStr, start, string.len(srcStr))
	return strVec
end

function TranStrToInt(srcStr, splitStr, intArray)
	local strVec = SplitStr(srcStr,splitStr)
	local count = 0
	for i = 0, table.length(strVec) - 1, 1 do
		if intArray.count <= i then
			break
		end
		count = i + 1
		intArray.value[count] = tonumber2(strVec[i])
	end
	return count
end


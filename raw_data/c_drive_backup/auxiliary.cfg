-- 反向查找指定字符串函数
function findEnd(srcStr, str)
	local tempStr = string.reverse(srcStr)
	local tempDest = string.reverse(str)	
	_,pos = string.find(tempStr, tempDest)
	if pos == nil or str == "." then
		return -1
	end
	return string.len(tempStr) - pos + 1
end

function removeStr(srcStr, index, count)
	if index < 0 then
		index = 1
	end
	if count < 0 then
		count = 0
	end	
	local beginStr = string.sub(srcStr, 1, index - 1)
	local strLen = string.len(srcStr)
	local endStr = string.sub(srcStr, index + count, strLen)
	local newStr = beginStr .. endStr
	print(strLen, " beginStr is ", beginStr, "srcStr is ", srcStr, "\n endStr is ", endStr, "newStr is ", newStr)
	return beginStr .. endStr
end


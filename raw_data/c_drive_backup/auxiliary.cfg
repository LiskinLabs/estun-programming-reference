function checkStrIsValid(strTable, number)
	if table.length(strTable) >= number then
		return tonumber2(strTable[number - 1]) --由于lua数组值编号是从0开始，但传入的值是从1开始，故需减1
	end
	return 0
end

function TranStrToApos(srcStr, splitStr, pos)
	local strVec = SplitStr(srcStr,splitStr)
	local posVec = SplitStr(strVec[0],";")  --将用;分割的apos类型、坐标值依次取出。
	if table.length(posVec) < 2 then
		return 1
	end

	local posTable = SplitStr(posVec[1],",")
	pos.a1 = checkStrIsValid(posTable, 1)
	pos.a2 = checkStrIsValid(posTable, 2)
	pos.a3 = checkStrIsValid(posTable, 3)
	pos.a4 = checkStrIsValid(posTable, 4)
	pos.a5 = checkStrIsValid(posTable, 5)
	pos.a6 = checkStrIsValid(posTable, 6)
	pos.a7 = checkStrIsValid(posTable, 7)
	pos.a8 = checkStrIsValid(posTable, 8)
	pos.a9 = checkStrIsValid(posTable, 9)
	pos.a10 = checkStrIsValid(posTable, 10)
	pos.a11 = checkStrIsValid(posTable, 11)
	pos.a12 = checkStrIsValid(posTable, 12)
	pos.a13 = checkStrIsValid(posTable, 13)
	pos.a14 = checkStrIsValid(posTable, 14)
	pos.a15 = checkStrIsValid(posTable, 15)
	pos.a16 = checkStrIsValid(posTable, 16)

	return 0
end

function TranStrToCpos(srcStr, splitStr, pos)
	local strVec = SplitStr(srcStr,splitStr)
	local posVec = SplitStr(strVec[0],";")  --将用;分割的cpos类型、cfg参数、坐标值依次取出。
	if table.length(posVec) < 3 then
		return 1
	end
	local cfgTable = SplitStr(posVec[1],",")	
	if table.length(cfgTable) < 7 then
		return 2
	end
	pos.confdata.mode = tonumber2(cfgTable[0])
	pos.confdata.cf1 = tonumber2(cfgTable[1])
	pos.confdata.cf2 = tonumber2(cfgTable[2])
	pos.confdata.cf3 = tonumber2(cfgTable[3])
	pos.confdata.cf4 = tonumber2(cfgTable[4])
	pos.confdata.cf5 = tonumber2(cfgTable[5])
	pos.confdata.cf6 = tonumber2(cfgTable[6])

	local posTable = SplitStr(posVec[2],",")
	pos.x = checkStrIsValid(posTable, 1)
	pos.y = checkStrIsValid(posTable, 2)
	pos.z = checkStrIsValid(posTable, 3)
	pos.a = checkStrIsValid(posTable, 4)
	pos.b = checkStrIsValid(posTable, 5)
	pos.c = checkStrIsValid(posTable, 6)
	pos.a7 = checkStrIsValid(posTable, 7)
	pos.a8 = checkStrIsValid(posTable, 8)
	pos.a9 = checkStrIsValid(posTable, 9)
	pos.a10 = checkStrIsValid(posTable, 10)
	pos.a11 = checkStrIsValid(posTable, 11)
	pos.a12 = checkStrIsValid(posTable, 12)
	pos.a13 = checkStrIsValid(posTable, 13)
	pos.a14 = checkStrIsValid(posTable, 14)
	pos.a15 = checkStrIsValid(posTable, 15)
	pos.a16 = checkStrIsValid(posTable, 16)

	return 0
end


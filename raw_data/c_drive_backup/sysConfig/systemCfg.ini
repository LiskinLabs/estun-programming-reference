;
;systemCfg.ini  系统参数配置
;
;系统参数
[SYS_PARAM]
;暂停再启动时弹出与否
ContinueDisplayDlgEnable = 1
;手动自动模式下网络检测使能
CheckNetworkEnable = 1
;指令中变量域显示 0:默认不显示 1:显示G:
DisplayVarScope = 1
;断电记忆程序指针行号功能(0:不启用，1：启用)
MemProgPCEnable         = 0
;安全门信号停机方式配置功能(0：暂停且不下励磁、1：暂停且下励磁、2：急停且下励磁)
SafeDoorMode            = 1
;长按复位IO（超过5s)，则重新加载自启动工程和程序功能 类似，系统IO-9的功能(0:不启用，1启用)
ResetSigAutoLoadProg	= 0




;系统IP参数
SetSysIPFlag            =0
ControllerIP =192.168.6.63

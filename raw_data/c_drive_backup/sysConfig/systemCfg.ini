RTOS2IP                 = 192.168.60.68
RTOS2IPNetmask          = 255.255.255.0
RTOS2IPGateway          = 192.168.60.200
;视觉参数: 设备类型DeviceType：1：2D, 2:3D  视觉类型Visiontype：0：静态  1：动态
